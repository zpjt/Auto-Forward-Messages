<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>极速高清影视直连中心</title>
    <style>
        :root { --bg-dark: #0f141c; --card-bg: #1a2332; --accent-color: #38bdf8; --text-light: #f3f4f6; --text-muted: #9ca3af; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; text-decoration: none; }
        body { background-color: var(--bg-dark); color: var(--text-light); font-family: sans-serif; padding-bottom: 50px; }
        .header { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--accent-color); position: sticky; top: 0; z-index: 100; }
        .header .logo { font-size: 20px; font-weight: bold; color: var(--accent-color); }
        .player-wrapper { width: 100%; background-color: #000; aspect-ratio: 16/9; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .category-bar { display: flex; gap: 10px; padding: 15px 12px; overflow-x: auto; white-space: nowrap; }
        .category-bar::-webkit-scrollbar { display: none; }
        .cat-item { background-color: var(--card-bg); color: var(--text-muted); padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: bold; border: 1px solid #2b394a; cursor: pointer; }
        .cat-item.active { background-color: var(--accent-color); color: #000; border-color: var(--accent-color); }
        .section-title { font-size: 16px; font-weight: bold; padding: 10px 15px; color: var(--text-light); }
        .video-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 12px; }
        .video-card { background-color: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid #2b394a; cursor: pointer; }
        .thumb-box { position: relative; width: 100%; aspect-ratio: 16/10; background-color: #000; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
        .duration { position: absolute; bottom: 6px; right: 6px; background: rgba(0, 0, 0, 0.75); color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 4px; }
        .video-info { padding: 10px; }
        .video-title { font-size: 13px; font-weight: bold; line-height: 1.4; height: 36px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; color: var(--text-light); }
        .video-meta { font-size: 11px; color: var(--text-muted); margin-top: 6px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="header"><div class="logo">🎬 极速影音直连厅</div></div>
    <div class="player-wrapper">
        <!-- 核心修复：更换为中国大厂加速节点、支持公网跨域放行的标准免签 H5 视频流 -->
        <video id="videoPlayer" controls autoplay playsinline src="https://qq.com"></video>
    </div>
    <div class="category-bar">
        <div class="cat-item active">全部影视</div>
        <div class="cat-item">正在热播</div>
    </div>
    <div class="section-title">🔥 正在实时热播</div>
    <div class="video-grid">
        <!-- 视频 1 -->
        <div class="video-card" onclick="playVideo('https://qq.com')">
            <div class="thumb-box"><img src="https://unsplash.com"><span class="duration">00:46</span></div>
            <div class="video-info"><div class="video-title">演示影视：大厂专线极速演示高清纪录片</div><div class="video-meta"><span>👁️ 84.2万</span><span>👍 98%</span></div></div>
        </div>
        <!-- 视频 2 -->
        <div class="video-card" onclick="playVideo('https://w3schools.com')">
            <div class="thumb-box"><img src="https://unsplash.com"><span class="duration">00:10</span></div>
            <div class="video-info"><div class="video-title">演示动画：通用 H5 网页流媒体兼容性测试片</div><div class="video-meta"><span>👁️ 51.7万</span><span>👍 96%</span></div></div>
        </div>
    </div>
    <script>
        const player = document.getElementById('videoPlayer');
        const tg = window.Telegram.WebApp;
        if (tg) { tg.ready(); tg.expand(); }
        function playVideo(url) {
            player.src = url;
            player.currentTime = 0;
            player.play();
            if (tg && tg.HapticFeedback) { tg.HapticFeedback.impactOccurred('medium'); }
        }
    </script>
</body>
</html>
