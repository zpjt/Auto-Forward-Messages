    <script>
        const player = document.getElementById('videoPlayer');
        const container = document.getElementById('videoContainer');
        const apiEndpoint = "https://kkzyapi.com";

        async function loadLiveVideos() {
            try {
                let response = await fetch(apiEndpoint + "?ac=videolist&pg=1");
                let result = await response.json();
                if (result && result.list) {
                    container.innerHTML = "";
                    result.list.slice(0, 40).forEach(item => {
                        let card = document.createElement('div');
                        card.className = 'video-card';
                        card.onclick = () => { player.src = item.vod_play_url; player.play(); };
                        card.innerHTML = '<div class="thumb-box"><img src="' + item.vod_pic + '"></div><div class="video-info"><div class="video-title">' + item.vod_name + '</div></div>';
                        container.appendChild(card);
                    });
                } else {
                    container.innerHTML = "<p>No stream...</p>";
                }
            } catch (error) {
                container.innerHTML = "<p>Loading...</p>";
            }
        }
        window.onload = loadLiveVideos;
    </script>
</body>
</html>
