<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Station</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f141c; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h2 { margin-bottom: 25px; font-size: 20px; color: #a2acb8; }
        .btn-list { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }
        .route-btn { 
            padding: 18px; background: #1c2635; border: none; 
            color: #ffffff; text-decoration: none; text-align: center; 
            border-radius: 12px; font-size: 16px; font-weight: 500;
            transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .route-btn:active { background: #0088cc; transform: scale(0.98); }
    </style>
</head>
<body>

    <h2>⚡ 线路调试中心</h2>
    <div class="btn-list" id="btnList"></div>

    <script>
        // 初始化 Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();

        const sources = [
            { name: "主线路 A (极速)", url: "https://pku.xthpdkw.com" },
            { name: "主线路 B (稳定)", url: "https://scu.bbjhmptj.com" },
            { name: "主线路 C (备用)", url: "https://sysu.qahusxaaj.cc" },
            { name: "主线路 D (全球)", url: "https://nku.bbjhmptj.com" }
        ];

        const container = document.getElementById('btnList');

        sources.forEach(s => {
            const btn = document.createElement('div');
            btn.className = 'route-btn';
            btn.innerText = s.name;
            btn.onclick = () => {
                // 1. 触发触觉反馈 (轻震)
                tg.HapticFeedback.impactOccurred('light');
                // 2. 跳转到外部浏览器
                tg.openLink(s.url);
            };
            container.appendChild(btn);
        });
    </script>
</body>
</html>
