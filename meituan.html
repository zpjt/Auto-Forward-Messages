<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoDine 菜单</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50">
    <header class="bg-white p-4 shadow-sm text-center font-bold text-xl">GoDine 餐厅</header>
    <div id="menu-list" class="p-4 space-y-4"></div>

    <script>
        const SUPABASE_URL = 'https://dzesfxynbljtkwsbhbvq.supabase.co';
        const SUPABASE_KEY = 'Sb_publishable_sRewE8k63terKgMBcBV3wQ_0LKBXpNZ';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchMenu() {
            // 读取表“种类”
            const { data, error } = await supabase.from('种类').select('*');
            
            const container = document.getElementById('menu-list');
            if (error) {
                container.innerHTML = `<p style="color:red">错误: ${error.message}</p>`;
                return;
            }

            if (data) {
                container.innerHTML = data.map(item => `
                    <div class="bg-white p-4 rounded-lg shadow flex justify-between items-center">
                        <div>
                            <h3 class="font-bold text-lg">${item.product || '未知菜品'}</h3>
                            <p class="text-orange-500 font-bold">¥${item.价格 || '0'}</p>
                        </div>
                        <button class="bg-green-500 text-white px-4 py-2 rounded-full">+</button>
                    </div>
                `).join('');
            }
        }
        fetchMenu();
    </script>
</body>
</html>
