<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoDine 餐厅</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100">
    <header class="bg-white p-4 shadow-sm text-center font-bold text-xl">GoDine 餐厅</header>
    <div id="menu-list" class="p-4 space-y-4">
        <p class="text-center text-gray-500">正在加载菜单...</p>
    </div>

    <script>
        // 初始化 Supabase
        const SUPABASE_URL = 'https://dzesfxynbljtkwsbhbvq.supabase.co';
        const SUPABASE_KEY = 'Sb_publishable_sRewE8k63terKgMBcBV3wQ_0LKBXpNZ';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchMenu() {
            const container = document.getElementById('menu-list');
            
            // 从 menu 表中读取所有数据
            const { data, error } = await supabase.from('menu').select('*');
            
            if (error) {
                container.innerHTML = `<p class="text-red-500 text-center">错误: ${error.message}</p>`;
                return;
            }

            if (data && data.length > 0) {
                container.innerHTML = data.map(item => `
                    <div class="bg-white p-4 rounded-lg shadow flex justify-between items-center">
                        <div>
                            <h3 class="font-bold text-lg">${item.product}</h3>
                            <p class="text-orange-500 font-bold">¥${item.price}</p>
                        </div>
                        <button class="bg-green-500 text-white px-4 py-2 rounded-full">+</button>
                    </div>
                `).join('');
            } else {
                container.innerHTML = `<p class="text-center">菜单暂无数据。</p>`;
            }
        }
        
        fetchMenu();
    </script>
</body>
</html>
