<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>测试</title>
</head>
<body>
    <h1 id="msg">代码已运行</h1>
    <script>
        console.log("脚本已执行");
        document.getElementById('msg').innerText = "脚本已成功执行，准备加载Supabase...";
        
        // 尝试手动加载库
        const script = document.createElement('script');
        script.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";
        script.onload = () => {
            document.getElementById('msg').innerText = "Supabase库加载成功！";
        };
        script.onerror = () => {
            document.getElementById('msg').innerText = "错误：库加载失败！";
        };
        document.head.appendChild(script);
    </script>
</body>
</html>
