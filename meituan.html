<!DOCTYPE html>

    <script>
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6ZXNmeHluYmxqdGt3c2JoYnZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2OTI1NjksImV4cCI6MjA5ODI2ODU2OX0.fcpHEdZUqNABHa1fZ0AJtkucwj-MYRPuSzDoQxkkLLk';
        const SUPABASE_URL = 'https://dzesfxynbljtkwsbhbvq.supabase.co';
        
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('orderId');

        async function init() {
            if (orderId) {
                // 代付模式
                const res = await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${orderId}`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }});
                const data = await res.json();

                document.getElementById('main-content').innerHTML = `
                    <div class="bg-white p-6 rounded-3xl shadow-sm text-center">
                        <h2 class="text-xl font-black text-gray-800">好友邀请代付</h2>
                        <div class="text-5xl font-black text-[#ff4e00] my-8">¥${order.total}</div>

                    </div>`;
            } else {
                // 点餐模式
                const res = await fetch(`${SUPABASE_URL}/rest/v1/menu?select=*`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }});
                const data = await res.json();
                document.getElementById('main-content').innerHTML = data.map(item => `

                    </div>`).join('');
            }
        }

        async function createOrder(name, price) {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/orders`, {
                method: 'POST',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
                body: JSON.stringify({ items: [{name, price}], total: price, status: 'pending' })
            });
            const data = await res.json();
            const shareUrl = window.location.origin + window.location.pathname + "?orderId=" + data[0].id;
            prompt("点餐成功！复制此链接发给好友代付：", shareUrl);
        }

        function showPayment(total) {
            document.getElementById('pay-amount').innerText = total || 0;
            document.getElementById('payment-modal').classList.remove('hidden');
        }

        init();
    </script>
