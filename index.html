<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>外卖点餐系统 Pro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#f5f5f5;
  --card:#ffffff;
  --text:#111111;
  --muted:#8a8a8a;
  --primary:#ffd000;
  --primary-dark:#ffbf00;
  --danger:#ff4d4f;
  --success:#00b578;
  --border:#ececec;
  --shadow:0 8px 24px rgba(0,0,0,.06);
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text)}
.nav{display:flex;gap:10px;padding:14px 12px;background:linear-gradient(135deg,#111,#2b2b2b);position:sticky;top:0;z-index:10;overflow:auto}
.nav-item{padding:10px 14px;border-radius:999px;cursor:pointer;background:rgba(255,255,255,.08);color:#fff;font-weight:700;white-space:nowrap;user-select:none;}
.nav-item.active{background:var(--primary);color:#111}
.tab-view{display:none;padding:14px;max-width:1100px;margin:0 auto}
.tab-view.active{display:block}
h2{margin:8px 0 14px;font-size:22px;font-weight:800}
h3{margin:4px 0 12px;font-size:18px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select{padding:12px 14px;border:1px solid #ddd;border-radius:14px;background:#fff;outline:none;width:100%}
input:focus,select:focus{border-color:#ffcf33;box-shadow:0 0 0 4px rgba(255,208,0,.18)}
.btn{padding:10px 14px;border:0;border-radius:14px;cursor:pointer;font-weight:700;width:100%}
.btn:hover{opacity:.95}
.p{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#111}
.w{background:#fff3bf;color:#8a5b00;border:1px solid #ffe08a}
.d{background:linear-gradient(135deg,#ff7875,#ff4d4f);color:#fff}
.g{background:linear-gradient(135deg,#4cd964,#00b578);color:#fff}
.muted{color:var(--muted)}
.flex-between{display:flex;justify-content:space-between;align-items:center;}
.clickable{cursor:pointer;transition:transform 0.1s;}
.clickable:active{transform:scale(0.98);}
.badge{padding:4px 8px;border-radius:6px;font-size:12px;font-weight:bold;}
.badge.wait{background:#fff3bf;color:#8a5b00;}
.badge.success{background:#d4edda;color:#155724;}

/* 美团分享卡片及代付页专属样式 */
.mt-share-card { background: #1c1c1e; border-radius: 16px; overflow: hidden; color: #fff; box-shadow: 0 8px 24px rgba(0,0,0,0.15); margin-bottom: 15px;}
.mt-header { padding: 16px 20px; font-size: 14px; color: #b0b0b0; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.mt-body { background: #fff; color: #111; padding: 24px 20px; text-align: center; }
.mt-title { font-size: 22px; font-weight: 800; color: #222; margin-bottom: 15px; }
.mt-timer-box { background: #fafafa; border: 1px solid #eee; border-radius: 12px; padding: 16px; margin: 20px 0; }
.mt-timer-label { font-size: 13px; color: #888; margin-bottom: 6px; }
.mt-timer-value { font-size: 32px; font-weight: 900; color: #111; letter-spacing: 2px; }
</style>
</head>
<body>

<!-- 导航栏 -->
<div class="nav" id="main-nav">
  <div class="nav-item active" data-tab="view-stores">🏪 商家</div>
  <div class="nav-item" data-tab="view-cart">🛒 购物车</div>
  <div class="nav-item" data-tab="view-orders">📋 订单</div>
  <div class="nav-item" id="nav-admin" data-tab="view-admin" style="display:none;">⚙️ 管理</div>
  <div class="nav-item" data-tab="view-auth" id="nav-auth-btn" style="margin-left:auto; background:rgba(255,255,255,0.2);">🔐 登录/注册</div>
</div>

<!-- 1. 商家列表视图 -->
<div id="view-stores" class="tab-view active">
  <div id="stores-header">
    <h2>商家列表</h2>
  </div>
  <div id="store-list" class="muted">加载中...</div>
</div>

<!-- 2. 购物车视图 -->
<div id="view-cart" class="tab-view">
  <h2>购物车</h2>
  <div class="card flex-between">
    <div>共 <b id="cart-count">0</b> 件，合计 ¥<b id="cart-total">0.00</b></div>
    <button class="btn p" onclick="checkout()">提交订单</button>
  </div>
  <div id="cart-list" class="muted">购物车为空</div>
</div>

<!-- 3. 我的订单与分享视图 -->
<div id="view-orders" class="tab-view">
  <h2>我的订单</h2>
  <div id="order-list" class="muted">加载中...</div>
</div>

<!-- 4. 美团代付好友点击进入的专用视图 -->
<div id="view-mt-pay" class="tab-view">
  <div class="mt-share-card">
    <div class="mt-header">
      <span>🟡</span> 美团外卖 | 外卖美食奶茶... 交易保障
    </div>
    <div class="mt-body">
      <div style="font-size: 15px; color: #666; margin-bottom: 15px; text-align: left;">Hi, 你和我的距离只差一顿外卖~</div>
      <div class="mt-title">来帮我代付吧 ~</div>
      <div class="mt-timer-box">
        <div class="mt-timer-label">剩余支付时间</div>
        <div class="mt-timer-value" id="mt-countdown">14:59</div>
      </div>
      <div style="font-size: 15px; color: #333; margin-bottom: 15px;" id="mt-order-content">外卖订单</div>
      <div style="font-size: 32px; font-weight: 800; color: #ff5722; margin-bottom: 20px;">¥<span id="mt-order-total">0.00</span></div>
      
      <button class="btn p" style="font-size:18px; border-radius:12px;" onclick="goToWeChatPay()">为好友买单 (微信支付)</button>
    </div>
  </div>
</div>

<!-- 5. 账户中心视图 -->
<div id="view-auth" class="tab-view">
  <h2>账户中心</h2>
  <div class="card" id="auth-logged-out">
    <h3>用户登录 / 注册</h3>
    <div style="display:flex; flex-direction:column; gap:12px;">
      <input id="auth-email" type="email" placeholder="请输入邮箱 (如 admin@qq.com)" />
      <input id="auth-password" type="password" placeholder="请输入密码 (至少6位)" />
      <div class="row">
        <button class="btn p" onclick="handleAuth('signin')" style="flex:1;">立即登录</button>
        <button class="btn w" onclick="handleAuth('signup')" style="flex:1;">注册新账号</button>
      </div>
    </div>
  </div>
  <div class="card" id="auth-logged-in" style="display:none;">
    <h3>欢迎回来！</h3>
    <p>当前登录账号：<b id="user-display-email">-</b></p>
    <p>身份：<b id="user-display-role" style="color:var(--success);">普通用户</b></p>
    <button class="btn d" onclick="handleSignOut()">退出登录</button>
  </div>
</div>

<!-- 6. 管理后台视图 -->
<div id="view-admin" class="tab-view">
  <h2>管理后台 <span style="font-size:14px; color:var(--success);">(已授权)</span></h2>
  <div class="card">
    <h3>新建商家</h3>
    <div class="row">
      <input id="store-input" placeholder="输入商家名称" />
      <button class="btn w" onclick="addStore()">添加商家</button>
    </div>
  </div>
  <div class="card">
    <h3>上架商品（菜单）</h3>
    <div class="row">
      <select id="admin-store-select"><option value="">请选择商家...</option></select>
      <input id="product-name-input" placeholder="输入商品/菜品名称" />
      <input id="product-price-input" type="number" placeholder="价格 (元)" />
      <button class="btn p" onclick="addProduct()">添加商品</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://dzesfxynbljtkwsbhbvq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6ZXNmeHluYmxqdGt3c2JoYnZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2OTI1NjksImV4cCI6MjA5ODI2ODU2OX0.fcpHEdZUqNABHa1fZ0AJtkucwj-MYRPuSzDoQxkkLLk';
const WECHAT_PAY_URL = 'https://payapp.wechatpay.cn/sjt/qr/AQFnMljnPzZWMgkyr_fDaWLI';

let client = null;
if (typeof supabase !== 'undefined') {
  client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
}

const ADMIN_EMAIL = 'admin@qq.com'; 
let cart = {}; 
let allStoresCache = [];
let currentUser = null;

const esc = t => String(t ?? '').replace(/[&<>"']/g, m => ({
  '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
}[m]));

// --- 账户状态监听 ---
if (client) {
  client.auth.onAuthStateChange((event, session) => {
    currentUser = session?.user || null;
    updateAuthUI();
  });
}

function updateAuthUI() {
  const navAdmin = document.getElementById('nav-admin');
  const navAuthBtn = document.getElementById('nav-auth-btn');
  const loggedOutCard = document.getElementById('auth-logged-out');
  const loggedInCard = document.getElementById('auth-logged-in');
  
  if (currentUser) {
    navAuthBtn.innerText = `👤 ${currentUser.email.split('@')[0]}`;
    loggedOutCard.style.display = 'none';
    loggedInCard.style.display = 'block';
    document.getElementById('user-display-email').innerText = currentUser.email;
    
    if (currentUser.email === ADMIN_EMAIL) {
      navAdmin.style.display = 'block';
      document.getElementById('user-display-role').innerText = '👑 超级管理员';
      document.getElementById('user-display-role').style.color = 'orange';
    } else {
      navAdmin.style.display = 'none';
      document.getElementById('user-display-role').innerText = '普通用户';
      document.getElementById('user-display-role').style.color = 'var(--success)';
    }
  } else {
    navAuthBtn.innerText = '🔐 登录/注册';
    navAdmin.style.display = 'none';
    loggedOutCard.style.display = 'block';
    loggedInCard.style.display = 'none';
  }
}

// --- 导航切换 ---
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelectorAll('.tab-view').forEach(t => t.classList.remove('active'));
    item.classList.add('active');
    const tabId = item.getAttribute('data-tab');
    document.getElementById(tabId).classList.add('active');
    
    if(tabId === 'view-stores') fetchStores();
    if(tabId === 'view-orders') fetchOrders();
    if(tabId === 'view-admin') prepareAdminForm();
  });
});

// --- 登录/注册处理 ---
async function handleAuth(type) {
  if (!client) return alert('数据库服务未就绪');
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  if(!email || !password) return alert('请输入完整的邮箱和密码！');
  
  try {
    if(type === 'signup') {
      const { error } = await client.auth.signUp({ email, password });
      if(error) alert('注册失败: ' + error.message);
      else alert('注册成功！已自动为您登录。');
    } else {
      const { error } = await client.auth.signInWithPassword({ email, password });
      if(error) alert('登录失败: ' + error.message);
      else alert('登录成功！欢迎回来。');
    }
  } catch(e) {
    alert('系统错误: ' + e.message);
  }
}

async function handleSignOut() {
  if (client) {
    await client.auth.signOut();
    alert('已退出登录');
  }
}

// --- 1. 商家与菜单 ---
async function fetchStores() {
  document.getElementById('stores-header').innerHTML = '<h2>商家列表</h2>';
  document.getElementById('store-list').innerHTML = '加载中...';
  if (!client) return;

  try {
    const { data, error } = await client.from('stores').select('*').order('id', { ascending: false });
    if (error) { document.getElementById('store-list').innerHTML = `<div class="card d">获取失败: ${esc(error.message)}</div>`; return; }
    allStoresCache = data || [];
    if (allStoresCache.length === 0) {
      document.getElementById('store-list').innerHTML = '<div class="card">暂无商家。请登录 admin@qq.com 前往管理后台添加。</div>';
      return;
    }
    document.getElementById('store-list').innerHTML = allStoresCache.map(store => `
      <div class="card flex-between clickable" onclick="fetchProducts(${store.id}, '${esc(store.name)}')">
        <div><b>${esc(store.name)}</b><br/><span class="muted" style="font-size:12px;">点击进入查看菜单 ➡️</span></div>
      </div>
    `).join('');
  } catch (err) {
    document.getElementById('store-list').innerHTML = `<div class="card d">连接异常: ${esc(err.message)}</div>`;
  }
}

async function fetchProducts(storeId, storeName) {
  document.getElementById('stores-header').innerHTML = `
    <button class="btn w" style="width:auto; margin-bottom:10px;" onclick="fetchStores()">⬅️ 返回商家列表</button>
    <h2>${storeName} 的菜单</h2>
  `;
  document.getElementById('store-list').innerHTML = '正在载入菜单...';

  try {
    const { data, error } = await client.from('products').select('*').eq('store_id', storeId).order('id', { ascending: false });
    if (error) { document.getElementById('store-list').innerHTML = `<div class="card d">获取菜单失败: ${esc(error.message)}</div>`; return; }
    if (!data || data.length === 0) { document.getElementById('store-list').innerHTML = '<div class="card">该商家还没上架商品</div>'; return; }

    document.getElementById('store-list').innerHTML = data.map(product => `
      <div class="card flex-between">
        <div><b>${esc(product.name)}</b><br/><span style="color:var(--danger); font-weight:bold;">¥${Number(product.price).toFixed(2)}</span></div>
        <button class="btn p" style="width:auto;" onclick="addToCart(${product.id}, '${esc(product.name)}', ${product.price})">+ 购物车</button>
      </div>
    `).join('');
  } catch (err) {
    document.getElementById('store-list').innerHTML = `<div class="card d">异常: ${esc(err.message)}</div>`;
  }
}

// --- 2. 购物车 ---
function addToCart(id, name, price) {
  if (cart[id]) cart[id].count += 1;
  else cart[id] = { name, price, count: 1 };
  updateCartUI();
  alert(`已将【${name}】加入购物车！`);
}

function updateCartUI() {
  let totalCount = 0, totalPrice = 0, html = '';
  for (const id in cart) {
    const item = cart[id];
    totalCount += item.count;
    totalPrice += item.price * item.count;
    html += `<div class="card flex-between"><div><b>${item.name}</b> <span class="muted">x ${item.count}</span></div><div>¥${(item.price * item.count).toFixed(2)}</div></div>`;
  }
  document.getElementById('cart-count').innerText = totalCount;
  document.getElementById('cart-total').innerText = totalPrice.toFixed(2);
  document.getElementById('cart-list').innerHTML = html || '购物车为空';
}

async function checkout() {
  if (!currentUser) { alert('请先去登录账号！'); document.querySelector('[data-tab="view-auth"]').click(); return; }
  const items = Object.values(cart);
  if (items.length === 0) return alert('购物车是空的！');
  const totalPrice = items.reduce((sum, item) => sum + (item.price * item.count), 0);
  const content = items.map(i => `${i.name} x${i.count}`).join(', ');

  try {
    const { error } = await client.from('orders').insert([{ content, items: content, total: totalPrice, status: '待支付' }]);
    if (error) alert('提交失败: ' + error.message);
    else {
      alert('订单提交成功！');
      cart = {}; updateCartUI();
      document.querySelector('[data-tab="view-orders"]').click();
    }
  } catch (err) { alert('异常: ' + err.message); }
}

// --- 3. 订单列表与分享功能 ---
async function fetchOrders() {
  document.getElementById('order-list').innerHTML = '加载中...';
  try {
    const { data, error } = await client.from('orders').select('*').order('id', { ascending: false });
    if (error) { document.getElementById('order-list').innerHTML = `<div class="card d">获取失败</div>`; return; }
    if (!data || data.length === 0) { document.getElementById('order-list').innerHTML = '暂无订单'; return; }

    document.getElementById('order-list').innerHTML = data.map(order => `
      <div class="card">
        <div class="flex-between">
          <b>订单号: #${order.id}</b>
          <span class="badge wait">${esc(order.status || '待支付')}</span>
        </div>
        <div class="muted" style="margin: 8px 0;">${esc(order.content)}</div>
        <div class="flex-between" style="margin-top:10px;">
          <b style="color:var(--danger); font-size:18px;">¥${Number(order.total).toFixed(2)}</b>
          <button class="btn p" style="width:auto;" onclick="shareOrder('${esc(order.content)}', ${order.total})">🎁 一键分享给好友代付</button>
        </div>
      </div>
    `).join('');
  } catch (err) { document.getElementById('order-list').innerHTML = '加载异常'; }
}

async function shareOrder(content, total) {
  const shareUrl = window.location.origin + window.location.pathname + 
                   "?amount=" + total + "&content=" + encodeURIComponent(content);
  const shareData = {
    title: '来帮我代付吧 ~',
    text: `Hi, 你和我的距离只差一顿外卖~ ${content} 需付款 ¥${total}`,
    url: shareUrl
  };

  if (navigator.share) {
    try { await navigator.share(shareData); } catch (e) {}
  } else {
    navigator.clipboard.writeText(shareUrl);
    alert("链接已复制，快发给好友吧！");
  }
}

// --- 4. 管理后台 ---
async function prepareAdminForm() {
  if (!currentUser || currentUser.email !== ADMIN_EMAIL) { alert('无权访问'); document.querySelector('[data-tab="view-stores"]').click(); return; }
  const select = document.getElementById('admin-store-select');
  try {
    const { data } = await client.from('stores').select('*').order('name');
    select.innerHTML = '<option value="">请选择商家...</option>' + (data || []).map(s => `<option value="${s.id}">${esc(s.name)}</option>`).join('');
  } catch (e) {}
}

async function addStore() {
  const name = document.getElementById('store-input').value.trim();
  if (!name) return alert('请输入名称');
  const { error } = await client.from('stores').insert([{ name }]);
  if (error) alert('失败'); else { alert('成功'); document.getElementById('store-input').value = ''; prepareAdminForm(); }
}

async function addProduct() {
  const storeId = document.getElementById('admin-store-select').value;
  const name = document.getElementById('product-name-input').value.trim();
  const price = parseFloat(document.getElementById('product-price-input').value);
  if (!storeId || !name || isNaN(price)) return alert('请完整填写');
  const { error } = await client.from('products').insert([{ name, price, store_id: storeId }]);
  if (error) alert('失败'); else { alert('上架成功'); document.getElementById('product-name-input').value = ''; document.getElementById('product-price-input').value = ''; }
}

// --- 5. 路由拦截：检测是否为好友通过分享链接点入 ---
function initRouter() {
  const params = new URLSearchParams(window.location.search);
  const amount = params.get('amount');
  const content = params.get('content');

  if (amount) {
    // 隐藏主导航和所有其他视图，只显示美团代付专属页
    document.getElementById('main-nav').style.display = 'none';
    document.querySelectorAll('.tab-view').forEach(t => t.classList.remove('active'));
    document.getElementById('view-mt-pay').classList.add('active');
    
    document.getElementById('mt-order-total').innerText = amount;
    if (content) document.getElementById('mt-order-content').innerText = decodeURIComponent(content);
    
    // 启动14:59倒计时
    let timer = 899;
    setInterval(() => {
      let m = parseInt(timer / 60, 10);
      let s = parseInt(timer % 60, 10);
      document.getElementById('mt-countdown').textContent = (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
      if (--timer < 0) timer = 0;
    }, 1000);
  } else {
    if (client) fetchStores();
  }
}

function goToWeChatPay() {
  window.location.href = WECHAT_PAY_URL;
}

// 页面启动
window.onload = () => {
  initRouter();
};
</script>
</body>
</html>
