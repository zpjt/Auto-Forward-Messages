<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Order Hub</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg-color: #0f141c; 
            --card-bg: #1a2332; 
            --accent: #ffcc00; 
            --text: #ffffff;
            --text-dim: #9ca3af;
        }
        body { 
            background: var(--bg-color); 
            color: var(--text); 
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; 
            margin: 0; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { font-size: 24px; margin-bottom: 20px; letter-spacing: 1px; color: var(--accent); }
        
        #menu { 
            width: 100%; 
            max-width: 600px; 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 15px; 
        }
        
        .item-card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 16px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border: 1px solid #2d3748;
            transition: transform 0.2s, border-color 0.2s;
        }
        .item-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        
        .info { flex: 1; margin-right: 15px; }
        .info strong { font-size: 18px; display: block; margin-bottom: 4px; }
        .price { color: var(--accent); font-weight: bold; font-size: 16px; margin-top: 5px; }
        
        .btn-order { 
            background: var(--accent); 
            color: #000; 
            padding: 10px 20px; 
            border-radius: 50px; 
            border: none; 
            font-weight: 800; 
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-order:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <h1>Premium Menu</h1>
    <div id="menu">正在读取数据库数据...</div>

    <script>
        const SUPABASE_URL = "https://dzesfxynbljtkwsbhbvq.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6ZXNmeHluYmxqdGt3c2JoYnZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2OTI1NjksImV4cCI6MjA5ODI2ODU2OX0.fcpHEdZUqNABHa1fZ0AJtkucwj-MYRPuSzDoQxkkLLk";
        
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchProducts() {
            const { data, error } = await client.from('products').select('*');
            const menuDiv = document.getElementById('menu');

            if (error) {
                menuDiv.innerHTML = "加载失败: " + error.message;
                return;
            }

            if (!data || data.length === 0) {
                menuDiv.innerHTML = "数据库中暂无商品。";
                return;
            }

            menuDiv.innerHTML = data.map(item => `
                <div class="item-card">
                    ${item.image_url ? `<img src="${item.image_url}" style="width:80px; height:80px; border-radius:12px; object-fit:cover; margin-right:15px;">` : ''}
                    <div class="info">
                        <strong>${item.name}</strong>
                        ${item.description ? `<small style="color:var(--text-dim);">${item.description}</small>` : ''}
                        <div class="price">¥${item.price}</div>
                    </div>
                    <button class="btn-order" onclick="alert('下单逻辑对接中')">下单</button>
                </div>
            `).join('');
        }

        fetchProducts();
    </script>
</body>
</html>
