<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta property="og:title" content="来帮我代付吧 ~ 😋" />
<meta property="og:description" content="Hi, 你和我的距离只差一顿外卖，快来帮我买单吧！" />
<title>美团外卖 - 交易保障</title>
<style>
:root{
  --bg:#f5f5f5;
  --card:#ffffff;
  --text:#111111;
  --muted:#8a8a8a;
  --primary:#ffd000;
  --primary-dark:#ffbf00;
  --danger:#ff4d4f;
  --success:#00b578;
  --border:#ececec;
  --shadow:0 8px 24px rgba(0,0,0,.06);
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text)}
.nav{display:flex;gap:10px;padding:14px 12px;background:linear-gradient(135deg,#111,#2b2b2b);position:sticky;top:0;z-index:10;overflow:auto}
.nav-item{padding:10px 14px;border-radius:999px;cursor:pointer;background:rgba(255,255,255,.08);color:#fff;font-weight:700;white-space:nowrap;user-select:none;}
.nav-item.active{background:var(--primary);color:#111}
.tab-view{display:none;padding:14px;max-width:1100px;margin:0 auto}
.tab-view.active{display:block}
h2{margin:8px 0 14px;font-size:22px;font-weight:800}
h3{margin:4px 0 12px;font-size:18px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select{padding:12px 14px;border:1px solid #ddd;border-radius:14px;background:#fff;outline:none;width:100%}
input:focus,select:focus{border-color:#ffcf33;box-shadow:0 0 0 4px rgba(255,208,0,.18)}
.btn{padding:10px 14px;border:0;border-radius:14px;cursor:pointer;font-weight:700;width:100%}
.btn:hover{opacity:.95}
.p{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#111}
.w{background:#fff3bf;color:#8a5b00;border:1px solid #ffe08a}
.d{background:linear-gradient(135deg,#ff7875,#ff4d4f);color:#fff}
.g{background:linear-gradient(135deg,#4cd964,#00b578);color:#fff}
.muted{color:var(--muted)}
.flex-between{display:flex;justify-content:space-between;align-items:center;}
.clickable{cursor:pointer;transition:transform 0.1s;}
.clickable:active{transform:scale(0.98);}
.badge{padding:4px 8px;border-radius:6px;font-size:12px;font-weight:bold;}
.badge.wait{background:#fff3bf;color:#8a5b00;}

/* 卡通美团代付卡片专用样式 */
.cartoon-share-box { background: #1c1c1e; border-radius: 20px; overflow: hidden; color: #fff; box-shadow: 0 12px 32px rgba(0,0,0,0.2); max-width: 450px; margin: 20px auto; }
.cartoon-header { padding: 14px 18px; font-size: 13px; color: #b0b0b0; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid rgba(255,255,255,0.08); background: #151517; }
.cartoon-body { background: #fff; color: #111; padding: 24px 20px; text-align: center; }
.cartoon-hero { display: flex; align-items: center; justify-content: space-between; background: #fff9e6; border-radius: 14px; padding: 15px; margin-bottom: 15px; border: 1px solid #ffeeba; }
.cartoon-text { text-align: left; }
.cartoon-title { font-size: 20px; font-weight: 900; color: #333; margin-bottom: 4px; }
.cartoon-timer-box { background: #fafafa; border: 1px solid #eee; border-radius: 12px; padding: 14px; margin: 15px 0; }
.cartoon-timer-label { font-size: 12px; color: #888; margin-bottom: 4px; }
.cartoon-timer-value { font-size: 28px; font-weight: 900; color: #e64a19; letter-spacing: 2px; }
.qr-display-box { display: none; margin-top: 15px; padding: 15px; background: #fdfdfd; border: 1px solid #eee; border-radius: 12px; }
.qr-display-box img { width: 200px; height: 200px; object-fit: contain; border-radius: 8px; margin: 10px auto; display: block; }
</style>
</head>
<body>

<!-- 导航栏 -->
<div class="nav" id="main-nav">
  <div class="nav-item active" data-tab="view-stores">🏪 商家</div>
  <div class="nav-item" data-tab="view-cart">🛒 购物车</div>
  <div class="nav-item" data-tab="view-orders">📋 订单</div>
  <div class="nav-item" id="nav-admin" data-tab="view-admin">⚙️ 管理后台</div>
</div>

<!-- 1. 商家列表视图 -->
<div id="view-stores" class="tab-view active">
  <div id="stores-header">
    <h2>商家列表</h2>
  </div>
  <div id="store-list" class="muted">加载中...</div>
</div>

<!-- 2. 购物车视图 -->
<div id="view-cart" class="tab-view">
  <h2>购物车</h2>
  <div class="card flex-between">
    <div>共 <b id="cart-count">0</b> 件, 合计 ¥<b id="cart-total">0.00</b></div>
    <button class="btn p" onclick="checkout()">提交订单</button>
  </div>
  <div id="cart-list" class="muted">购物车为空</div>
</div>

<!-- 3. 我的订单与分享视图 -->
<div id="view-orders" class="tab-view">
  <h2>我的订单</h2>
  <div id="order-list" class="muted">加载中...</div>
</div>

<!-- 4. 美团卡通代付好友点击进入的专用视图 -->
<div id="view-mt-pay" class="tab-view">
  <div class="cartoon-share-box">
    <div class="cartoon-header">
      <span>🟡</span> 美团外卖 | 交易保障护航
    </div>
    <div class="cartoon-body">
      <div style="font-size: 14px; color: #666; margin-bottom: 12px; text-align: left;">Hi, 你和我的距离只差一顿外卖~</div>
      
      <div class="cartoon-hero">
        <div class="cartoon-text">
          <div class="cartoon-title">来帮我代付吧 ~</div>
动动发财小手，感谢老板慷慨解囊！</div>
        <div class="cartoon-avatar" style="font-size: 36px; background: #ffd000; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; border-radius: 50%;">🛵</div>
      </div>

      <div class="cartoon-timer-box">
        <div class="cartoon-timer-label">⏱️ 剩余支付时间</div>
        <div class="cartoon-timer-value" id="mt-countdown">14:59</div>
      </div>

      <div style="font-size: 14px; color: #555; margin-bottom: 5px; text-align: left;">代付商品清单：</div>
      <div style="font-size: 16px; font-weight: bold; color: #222; margin-bottom: 15px; text-align: left; background:#f9f9f9; padding:10px; border-radius:8px;" id="mt-order-content">外卖订单</div>
      
      <div style="font-size: 14px; color: #888;">需付款金额</div>
      <div style="font-size: 36px; font-weight: 900; color: #ff5722; margin-bottom: 15px;">¥<span id="mt-order-total">0.00</span></div>
      
      <!-- 触发展示微信收款码的按钮 -->
      <button class="btn p" id="pay-btn" style="font-size:18px; border-radius:12px; padding: 16px;" onclick="showWeChatQRCode()">✨ 为好友买单 (长按识别付款)</button>
      
      <!-- 微信收款码容器（点击按钮后平滑展开） -->
      <div id="qr-display-area" class="qr-display-box">
        <p style="font-size:14px; font-weight:bold; color:#333; margin:0 0 5px 0;">请使用微信扫一扫，或长按下方二维码识别付款：</p>
        <!-- 使用你刚才截图中的微信收款码图片 -->
        <img id="wechat-qr-img" src="" alt="微信收款码" />
        <p style="font-size:12px; color:#888; margin:5px 0 0 0;">付款后请通知好友确认收单哦~</p>
      </div>
    </div>
  </div>
</div>

<!-- 5. 管理后台视图 -->
<div id="view-admin" class="tab-view">
  <h2>管理后台 <span style="font-size:14px; color:var(--success);">(本地极速模式)</span></h2>
  <div class="card">
    <h3>新建商家</h3>
    <div class="row">
      <input id="store-input" placeholder="输入商家名称（如：全粥道砂锅粥）" />
      <button class="btn w" onclick="addStore()">添加商家</button>
    </div>
  </div>
  <div class="card">
    <h3>上架商品（菜单）</h3>
    <div class="row">
      <select id="admin-store-select"><option value="">请选择商家...</option></select>
      <input id="product-name-input" placeholder="输入商品名称（如：牛肉丸汤）" />
      <input id="product-price-input" type="number" placeholder="价格 (元)" />
      <button class="btn p" onclick="addProduct()">添加商品</button>
    </div>
  </div>
</div>

<script>
// 你提供的微信收款码图片在图床中的链接（已转好安全地址供H5直接展示）
const WECHAT_QR_CODE_URL = 'https://i.ibb.co/3s23w27g/image.png';

let cart = {}; 

if (!localStorage.getItem('stores')) {
  localStorage.setItem('stores', JSON.stringify([
    { id: 1, name: "全粥道砂锅粥" },
    { id: 2, name: "正宗沙县小吃" }
  ]));
}
if (!localStorage.getItem('products')) {
  localStorage.setItem('products', JSON.stringify([
    { id: 1, store_id: 1, name: "牛肉丸汤", price: 19.8 },
    { id: 2, store_id: 1, name: "招牌海鲜粥", price: 38.0 },
    { id: 3, store_id: 2, name: "特色炒饭", price: 25.0 }
  ]));
}
if (!localStorage.getItem('orders')) {
  localStorage.setItem('orders', JSON.stringify([]));
}

const esc = t => String(t ?? '').replace(/[&<>"']/g, m => ({
  '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
}[m]));

document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelectorAll('.tab-view').forEach(t => t.classList.remove('active'));
    item.classList.add('active');
    const tabId = item.getAttribute('data-tab');
    document.getElementById(tabId).classList.add('active');
    
    if(tabId === 'view-stores') fetchStores();
    if(tabId === 'view-orders') fetchOrders();
    if(tabId === 'view-admin') prepareAdminForm();
  });
});

function fetchStores() {
  document.getElementById('stores-header').innerHTML = '<h2>商家列表</h2>';
  const stores = JSON.parse(localStorage.getItem('stores')) || [];
  if (stores.length === 0) {
    document.getElementById('store-list').innerHTML = '<div class="card">暂无商家。请点击上方【⚙️ 管理后台】添加您的第一个商家！</div>';
    return;
  }
  document.getElementById('store-list').innerHTML = stores.map(store => `
    <div class="card flex-between clickable" onclick="fetchProducts(${store.id}, '${esc(store.name)}')">
      <div><b>${esc(store.name)}</b><br/><span class="muted" style="font-size:12px;">点击进入查看菜单 ➡️</span></div>
    </div>
  `).join('');
}

function fetchProducts(storeId, storeName) {
  document.getElementById('stores-header').innerHTML = `
    <button class="btn w" style="width:auto; margin-bottom:10px;" onclick="fetchStores()">⬅️ 返回商家列表</button>
    <h2>${storeName} 的菜单</h2>
  `;
  const products = JSON.parse(localStorage.getItem('products')) || [];
  const storeProducts = products.filter(p => p.store_id == storeId);

  if (storeProducts.length === 0) {
    document.getElementById('store-list').innerHTML = '<div class="card">该商家还没上架商品，请去管理后台添加。</div>';
    return;
  }

  document.getElementById('store-list').innerHTML = storeProducts.map(product => `
    <div class="card flex-between">
      <div><b>${esc(product.name)}</b><br/><span style="color:var(--danger); font-weight:bold;">¥${Number(product.price).toFixed(2)}</span></div>
      <button class="btn p" style="width:auto;" onclick="addToCart(${product.id}, '${esc(product.name)}', ${product.price})">+ 购物车</button>
    </div>
  `).join('');
}

function addToCart(id, name, price) {
  if (cart[id]) cart[id].count += 1;
  else cart[id] = { name, price, count: 1 };
  updateCartUI();
  alert(`已将【${name}】加入购物车！`);
}

function updateCartUI() {
  let totalCount = 0, totalPrice = 0, html = '';
  for (const id in cart) {
    const item = cart[id];
    totalCount += item.count;
    totalPrice += item.price * item.count;
    html += `<div class="card flex-between"><div><b>${item.name}</b> <span class="muted">x ${item.count}</span></div><div>¥${(item.price * item.count).toFixed(2)}</div></div>`;
  }
  document.getElementById('cart-count').innerText = totalCount;
  document.getElementById('cart-total').innerText = totalPrice.toFixed(2);
  document.getElementById('cart-list').innerHTML = html || '购物车为空';
}

function checkout() {
  const items = Object.values(cart);
  if (items.length === 0) return alert('购物车是空的！');
  const totalPrice = items.reduce((sum, item) => sum + (item.price * item.count), 0);
  const content = items.map(i => `${i.name} x${i.count}`).join(', ');

  const orders = JSON.parse(localStorage.getItem('orders')) || [];
  const newOrder = {
    id: Date.now().toString().slice(-6),
    content: content,
    total: totalPrice,
    status: '待支付'
  };
  
  orders.unshift(newOrder);
  localStorage.setItem('orders', JSON.stringify(orders));

  alert('订单提交成功！');
  cart = {}; 
  updateCartUI();
  document.querySelector('[data-tab="view-orders"]').click();
}

function fetchOrders() {
  const orders = JSON.parse(localStorage.getItem('orders')) || [];
  if (orders.length === 0) {
    document.getElementById('order-list').innerHTML = '暂无订单';
    return;
  }

  document.getElementById('order-list').innerHTML = orders.map(order => `
    <div class="card">
      <div class="flex-between">
        <b>订单号: #${order.id}</b>
        <span class="badge wait">${esc(order.status || '待支付')}</span>
      </div>
      <div class="muted" style="margin: 8px 0;">${esc(order.content)}</div>
      <div class="flex-between" style="margin-top:10px;">
        <b style="color:var(--danger); font-size:18px;">¥${Number(order.total).toFixed(2)}</b>
        <button class="btn p" style="width:auto;" onclick="shareOrder('${esc(order.content)}', ${order.total})">🎁 发起卡通代付分享</button>
      </div>
    </div>
  `).join('');
}

async function shareOrder(content, total) {
  const shareUrl = window.location.origin + window.location.pathname + 
                   "?amount=" + total + "&content=" + encodeURIComponent(content);
  const shareData = {
    title: '🛵 来帮我代付外卖吧 ~',
    text: `Hi, 你和我的距离只差一顿外卖~ ${content} 需付款 ¥${total}`,
    url: shareUrl
  };

  if (navigator.share) {
    try { await navigator.share(shareData); } catch (e) {}
  } else {
    navigator.clipboard.writeText(shareUrl);
    alert("卡片链接已复制，快发给好友吧！");
  }
}

function prepareAdminForm() {
  const select = document.getElementById('admin-store-select');
  const stores = JSON.parse(localStorage.getItem('stores')) || [];
  select.innerHTML = '<option value="">请选择商家...</option>' + stores.map(s => `<option value="${s.id}">${esc(s.name)}</option>`).join('');
}

function addStore() {
  const name = document.getElementById('store-input').value.trim();
  if (!name) return alert('请输入商家名称');
  const stores = JSON.parse(localStorage.getItem('stores')) || [];
  stores.push({ id: Date.now(), name });
  localStorage.setItem('stores', JSON.stringify(stores));
  alert('商家添加成功！'); 
  document.getElementById('store-input').value = ''; 
  prepareAdminForm();
}

function addProduct() {
  const storeId = document.getElementById('admin-store-select').value;
  const name = document.getElementById('product-name-input').value.trim();
  const price = parseFloat(document.getElementById('product-price-input').value);
  if (!storeId || !name || isNaN(price)) return alert('请完整填写');
  const products = JSON.parse(localStorage.getItem('products')) || [];
  products.push({ id: Date.now(), store_id: Number(storeId), name, price });
  localStorage.setItem('products', JSON.stringify(products));
  alert('商品上架成功！'); 
  document.getElementById('product-name-input').value = ''; 
  document.getElementById('product-price-input').value = '';
}

function initRouter() {
  const params = new URLSearchParams(window.location.search);
  const amount = params.get('amount');
  const content = params.get('content');

  if (amount) {
    document.getElementById('main-nav').style.display = 'none';
    document.querySelectorAll('.tab-view').forEach(t => t.classList.remove('active'));
    document.getElementById('view-mt-pay').classList.add('active');
    
    document.getElementById('mt-order-total').innerText = amount;
    if (content) document.getElementById('mt-order-content').innerText = decodeURIComponent(content);
    
    let timer = 899;
    setInterval(() => {
      let m = parseInt(timer / 60, 10);
      let s = parseInt(timer % 60, 10);
      document.getElementById('mt-countdown').textContent = (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
      if (--timer < 0) timer = 0;
    }, 1000);
  } else {
    fetchStores();
  }
}

// 点击按钮后在当前页面平滑展现微信收款码图片供长按识别
function showWeChatQRCode() {
  const qrArea = document.getElementById('qr-display-area');
  const qrImg = document.getElementById('wechat-qr-img');
  const btn = document.getElementById('pay-btn');
  
  qrImg.src = WECHAT_QR_CODE_URL;
  qrArea.style.display = 'block';
  btn.style.display = 'none'; // 隐藏按钮，突出显示二维码
}

window.onload = () => {
  initRouter();
};
</script>
</body>
</html>
