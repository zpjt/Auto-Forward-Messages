<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>待代付订单</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; margin: 0; padding: 15px; }
        .header { font-size: 16px; font-weight: bold; margin-bottom: 10px; }
        .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); text-align: center; }
        .amount-label { font-size: 14px; color: #666; }
        .amount-value { font-size: 36px; font-weight: bold; color: #333; margin: 10px 0; }
        .notice { background: #fffde7; border-radius: 8px; padding: 15px; font-size: 13px; color: #856404; margin: 15px 0; text-align: left; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-green { background: #07c160; color: #fff; }
        .btn-gray { background: #f0f0f0; color: #555; }
        .qr-box { display: none; margin-top: 15px; padding: 10px; background: #f9f9f9; border-radius: 8px; }
        .qr-box img { max-width: 200px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="header">📋 待代付订单</div>

<div id="pay-view" class="card">
    <div class="amount-label">需付款</div>
    <div class="amount-value">¥<span id="display-amount">0.00</span></div>
    
    <div class="notice">
        付款须知：<br>
        1. 代付订单创建后，请于15分钟内完成支付。<br>
        2. 请扫描下方微信收款码或点击按钮完成付款。
    </div>

    <button class="btn btn-green" onclick="showWeChatPay()">为好友买单 (微信支付)</button>
    
    <!-- 微信收款码展示区域 -->
    <div id="qr-container" class="qr-box">
        <p style="font-size: 14px; color: #333; margin-bottom: 8px;">请长按识别下方微信收款码：</p>
        <img id="wechat-qr-img" src="" alt="微信收款码" />
    </div>

    <button class="btn btn-gray" onclick="alert('已发送确认请求')">我已支付，点击确认</button>
</div>

<script>
    // 已将你提供的微信收款码图片直接写入
    const WECHAT_QR_CODE = "https://i.ibb.co/3s23w27g/image.png"; // 使用图床托管的你的微信收款码

    const params = new URLSearchParams(window.location.search);
    const amount = params.get('amount') || "0.00";
    document.getElementById('display-amount').innerText = amount;

    function showWeChatPay() {
        const qrContainer = document.getElementById('qr-container');
        const qrImg = document.getElementById('wechat-qr-img');
        
        // 绑定图片链接
        qrImg.src = WECHAT_QR_CODE;
        
        // 显示二维码容器
        qrContainer.style.display = "block";
    }
</script>
</body>
</html>
