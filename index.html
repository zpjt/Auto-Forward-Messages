<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外卖系统</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #f8f8f8; font-family: sans-serif; padding-bottom: 70px; }
        .card { background: white; margin: 10px; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; }
        .tab-content { display: none; padding: 15px; }
        .active { display: block; }
        .nav-fixed { position: fixed; bottom: 0; width: 100%; height: 60px; background: #fff; display: flex; justify-content: space-around; border-top: 1px solid #ddd; align-items: center; z-index: 999; }
    </style>
</head>
<body>

    <div id="tab-home" class="tab-content active">
        <h2>附近商家</h2>
        <div id="store-container">加载中...</div>
    </div>

    <nav class="nav-fixed">
        <button onclick="showTab('tab-home')">🏠 主页</button>
        <button onclick="showTab('tab-promo')">🔥 特价</button>
        <button onclick="showTab('tab-orders')">📋 订单</button>
        <button onclick="showTab('tab-profile')">👤 我</button>
    </nav>

    <script>
        const client = supabase.createClient(
            "https://dzesfxynbljtkwsbhbvq.supabase.co", 
            "sb_publishable_sRewE8k63terKgMBcBV3wQ_0LKBXpNZ"
        );

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        async function initData() {
            try {
                const { data, error } = await client.from('stores').select('*');
                if (error) { console.error(error); return; }
                
                document.getElementById('store-container').innerHTML = data.map(s => `
                    <div class="card">
                        <h3>${s.name || '未命名'}</h3>
                        <p>${s.description || '暂无描述'}</p>
                    </div>
                `).join('');
            } catch(e) {
                console.error("系统错误", e);
            }
        }
        initData();
    </script>
</body>
</html>
