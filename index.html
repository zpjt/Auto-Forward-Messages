<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>外卖点餐系统 Pro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#f5f5f5;
  --card:#ffffff;
  --text:#111111;
  --muted:#8a8a8a;
  --primary:#ffd000;
  --primary-dark:#ffbf00;
  --danger:#ff4d4f;
  --success:#00b578;
  --border:#ececec;
  --shadow:0 8px 24px rgba(0,0,0,.06);
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text)}
.nav{display:flex;gap:10px;padding:14px 12px;background:linear-gradient(135deg,#111,#2b2b2b);position:sticky;top:0;z-index:10;overflow:auto}
.nav-item{padding:10px 14px;border-radius:999px;cursor:pointer;background:rgba(255,255,255,.08);color:#fff;font-weight:700;white-space:nowrap;user-select:none;}
.nav-item.active{background:var(--primary);color:#111}
.tab-view{display:none;padding:14px;max-width:1100px;margin:0 auto}
.tab-view.active{display:block}
h2{margin:8px 0 14px;font-size:22px;font-weight:800}
h3{margin:4px 0 12px;font-size:18px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select{padding:12px 14px;border:1px solid #ddd;border-radius:14px;background:#fff;outline:none}
input:focus,select:focus{border-color:#ffcf33;box-shadow:0 0 0 4px rgba(255,208,0,.18)}
.btn{padding:10px 14px;border:0;border-radius:14px;cursor:pointer;font-weight:700}
.btn:hover{opacity:.95}
.p{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#111}
.w{background:#fff3bf;color:#8a5b00;border:1px solid #ffe08a}
.d{background:linear-gradient(135deg,#ff7875,#ff4d4f);color:#fff}
.g{background:linear-gradient(135deg,#4cd964,#00b578);color:#fff}
.muted{color:var(--muted)}
.flex-between{display:flex;justify-content:space-between;align-items:center;}
.clickable{cursor:pointer;transition:transform 0.1s;}
.clickable:active{transform:scale(0.98);}
.badge{padding:4px 8px;border-radius:6px;font-size:12px;font-weight:bold;}
.badge.wait{background:#fff3bf;color:#8a5b00;}
.badge.success{background:#d4edda;color:#155724;}
@media (max-width:640px){
  .tab-view{padding:12px}
  h2{font-size:20px}
  .card{padding:12px;border-radius:16px}
  .row{gap:8px}
  input,select{width:100%}
  .btn{width:100%}
}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-item active" data-tab="view-stores">🏪 商家</div>
  <div class="nav-item" data-tab="view-cart">🛒 购物车</div>
  <div class="nav-item" data-tab="view-orders">📋 订单</div>
  <div class="nav-item" id="nav-admin" data-tab="view-admin" style="display:none;">⚙️ 管理</div>
  <div class="nav-item" data-tab="view-auth" id="nav-auth-btn" style="margin-left:auto; background:rgba(255,255,255,0.2);">🔐 登录/注册</div>
</div>

<div id="view-stores" class="tab-view active">
  <div id="stores-header">
    <h2>商家列表</h2>
  </div>
  <div id="store-list" class="muted">加载中...</div>
</div>

<div id="view-cart" class="tab-view">
  <h2>购物车</h2>
  <div class="card flex-between">
    <div>共 <b id="cart-count">0</b> 件，合计 ¥<b id="cart-total">0.00</b></div>
    <button class="btn p" onclick="checkout()">提交订单</button>
  </div>
  <div id="cart-list" class="muted">购物车为空</div>
</div>

<div id="view-orders" class="tab-view">
  <h2>我的订单</h2>
  <div id="order-list" class="muted">加载中...</div>
</div>

<div id="view-auth" class="tab-view">
  <h2>账户中心</h2>
  <div class="card" id="auth-logged-out">
    <h3>用户登录 / 注册</h3>
    <div style="display:flex; flex-direction:column; gap:12px;">
      <input id="auth-email" type="email" placeholder="请输入邮箱 (如 admin@qq.com)" />
      <input id="auth-password" type="password" placeholder="请输入密码 (至少6位)" />
      <div class="row">
        <button class="btn p" onclick="handleAuth('signin')" style="flex:1;">立即登录</button>
        <button class="btn w" onclick="handleAuth('signup')" style="flex:1;">注册新账号</button>
      </div>
    </div>
  </div>
  <div class="card" id="auth-logged-in" style="display:none;">
    <h3>欢迎回来！</h3>
    <p>当前登录账号：<b id="user-display-email">-</b></p>
    <p>身份：<b id="user-display-role" style="color:var(--success);">普通用户</b></p>
    <button class="btn d" onclick="handleSignOut()">退出登录</button>
  </div>
</div>

<div id="view-admin" class="tab-view">
  <h2>管理后台 <span style="font-size:14px; color:var(--success);">(已授权)</span></h2>
  <div class="card">
    <h3>新建商家</h3>
    <div class="row">
      <input id="store-input" placeholder="输入商家名称" />
      <button class="btn w" onclick="addStore()">添加商家</button>
    </div>
  </div>
  
  <div class="card">
    <h3>上架商品（菜单）</h3>
    <div class="row">
      <select id="admin-store-select"><option value="">请选择商家...</option></select>
      <input id="product-name-input" placeholder="输入商品/菜品名称" />
      <input id="product-price-input" type="number" placeholder="价格 (元)" />
      <button class="btn p" onclick="addProduct()">添加商品</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://dzesfxynbljtkwsbhbvq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6ZXNmeHluYmxqdGt3c2JoYnZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2OTI1NjksImV4cCI6MjA5ODI2ODU2OX0.fcpHEdZUqNABHa1fZ0AJtkucwj-MYRPuSzDoQxkkLLk';
const ALIPAY_PAY_URL = 'https://ibb.co/pr1C8R4P';
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 👑 在这里指定谁是管理员！你可以修改这个邮箱地址
const ADMIN_EMAIL = 'admin@qq.com'; 

let cart = {}; 
let allStoresCache = [];
let currentUser = null;

const esc = t => String(t ?? '').replace(/[&<>"']/g, m => ({
  '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
}[m]));

// --- 账户状态监听器 ---
client.auth.onAuthStateChange((event, session) => {
  currentUser = session?.user || null;
  updateAuthUI();
});

function updateAuthUI() {
  const navAdmin = document.getElementById('nav-admin');
  const navAuthBtn = document.getElementById('nav-auth-btn');
  const loggedOutCard = document.getElementById('auth-logged-out');
  const loggedInCard = document.getElementById('auth-logged-in');
  
  if (currentUser) {
    navAuthBtn.innerText = `👤 ${currentUser.email.split('@')[0]}`;
    loggedOutCard.style.display = 'none';
    loggedInCard.style.display = 'block';
    document.getElementById('user-display-email').innerText = currentUser.email;
    
    // 判断是否是管理员
    if (currentUser.email === ADMIN_EMAIL) {
      navAdmin.style.display = 'block';
      document.getElementById('user-display-role').innerText = '👑 超级管理员';
      document.getElementById('user-display-role').style.color = 'orange';
    } else {
      navAdmin.style.display = 'none';
      document.getElementById('user-display-role').innerText = '普通用户';
      document.getElementById('user-display-role').style.color = 'var(--success)';
      // 如果当前呆在管理页，强行踢回首页
      if(document.getElementById('view-admin').classList.contains('active')) {
        document.querySelector('[data-tab="view-stores"]').click();
      }
    }
  } else {
    navAuthBtn.innerText = '🔐 登录/注册';
    navAdmin.style.display = 'none';
    loggedOutCard.style.display = 'block';
    loggedInCard.style.display = 'none';
    if(document.getElementById('view-admin').classList.contains('active')) {
      document.querySelector('[data-tab="view-stores"]').click();
    }
  }
}

// --- 导航切换 ---
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelectorAll('.tab-view').forEach(t => t.classList.remove('active'));
    item.classList.add('active');
    const tabId = item.getAttribute('data-tab');
    document.getElementById(tabId).classList.add('active');
    
    if(tabId === 'view-stores') fetchStores();
    if(tabId === 'view-orders') fetchOrders();
    if(tabId === 'view-admin') prepareAdminForm();
  });
});

// --- 登录/注册处理 ---
async function handleAuth(type) {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  
  if(!email || !password) return alert('请输入完整的邮箱和密码！');
  
  if(type === 'signup') {
    const { data, error } = await client.auth.signUp({ email, password });
    if(error) alert('注册失败: ' + error.message);
    else alert('注册成功！已自动为您登录。');
  } else {
    const { data, error } = await client.auth.signInWithPassword({ email, password });
    if(error) alert('登录失败: ' + error.message);
    else alert('登录成功！欢迎回来。');
  }
}

async function handleSignOut() {
  await client.auth.signOut();
  alert('已退出登录');
}

// --- 1. 商家列表逻辑 ---
async function fetchStores() {
  document.getElementById('stores-header').innerHTML = '<h2>商家列表</h2>';
  document.getElementById('store-list').innerHTML = '加载中...';
  
  const { data, error } = await client.from('stores').select('*').order('id', { ascending: false });
  if (error) {
    document.getElementById('store-list').innerHTML = `<div class="card d">获取失败: ${esc(error.message)}</div>`;
    return;
  }
  allStoresCache = data || [];
  if (allStoresCache.length === 0) {
    document.getElementById('store-list').innerHTML = '暂无商家，请前往“管理”页面添加。';
    return;
  }

  document.getElementById('store-list').innerHTML = allStoresCache.map(store => `
    <div class="card flex-between clickable" onclick="fetchProducts(${store.id}, '${esc(store.name)}')">
      <div>
        <b>${esc(store.name)}</b>
        <br/><span class="muted" style="font-size:12px;">点击进入查看菜单 ➡️</span>
      </div>
    </div>
  `).join('');
}

// --- 2. 菜单列表逻辑 ---
async function fetchProducts(storeId, storeName) {
  document.getElementById('stores-header').innerHTML = `
    <button class="btn w" style="width:auto; margin-bottom:10px;" onclick="fetchStores()">⬅️ 返回商家列表</button>
    <h2>${storeName} 的菜单</h2>
  `;
  document.getElementById('store-list').innerHTML = '正在载入菜单...';

  const { data, error } = await client.from('products').select('*').eq('store_id', storeId).order('id', { ascending: false });
  if (error) {
    document.getElementById('store-list').innerHTML = `<div class="card d">获取菜单失败: ${esc(error.message)}</div>`;
    return;
  }
  if (!data || data.length === 0) {
    document.getElementById('store-list').innerHTML = '<div class="card">该商家太懒了，还没有上架任何商品。快叫管理员上架！</div>';
    return;
  }

  document.getElementById('store-list').innerHTML = data.map(product => `
    <div class="card flex-between">
      <div>
        <b>${esc(product.name)}</b>
        <br/><span style="color:var(--danger); font-weight:bold;">¥${Number(product.price).toFixed(2)}</span>
      </div>
      <button class="btn p" style="width:auto;" onclick="addToCart(${product.id}, '${esc(product.name)}', ${product.price})">+ 购物车</button>
    </div>
  `).join('');
}

// --- 3. 购物车逻辑 ---
function addToCart(id, name, price) {
  if (cart[id]) cart[id].count += 1;
  else cart[id] = { name, price, count: 1 };
  updateCartUI();
  alert(`已将【${name}】加入购物车！`);
}

function updateCartUI() {
  const list = document.getElementById('cart-list');
  let totalCount = 0; let totalPrice = 0; let html = '';

  for (const id in cart) {
    const item = cart[id];
    totalCount += item.count;
    totalPrice += item.price * item.count;
    html += `
      <div class="card flex-between">
        <div><b>${item.name}</b> <span class="muted">x ${item.count}</span></div>
        <div>¥${(item.price * item.count).toFixed(2)}</div>
      </div>
    `;
  }
  document.getElementById('cart-count').innerText = totalCount;
  document.getElementById('cart-total').innerText = totalPrice.toFixed(2);
  list.innerHTML = html || '购物车为空';
}

// --- 核心修复：提交订单对齐数据库 ---
async function checkout() {
  if (!currentUser) {
    alert('请先点击右上角去登录账号，才可以下单哦！');
    document.querySelector('[data-tab="view-auth"]').click();
    return;
  }

  const items = Object.values(cart);
  if (items.length === 0) return alert('购物车是空的！');

  const totalPrice = items.reduce((sum, item) => sum + (item.price * item.count), 0);
  const content = items.map(i => `${i.name} x${i.count}`).join(', ');

  // 🛠️ 对齐你的数据库：注入 content、items 并且初始化 status 为 待支付
  const { error } = await client.from('orders').insert([{ 
    content: content, 
    items: content, 
    total: totalPrice,
    status: '待支付'
  }]);

  if (error) {
    alert('提交订单失败: ' + error.message);
  } else {
    alert('订单提交成功！请去订单页面完成支付。');
    cart = {}; 
    updateCartUI();
    document.querySelector('[data-tab="view-orders"]').click();
  }
}

// --- 4. 订单列表与模拟支付逻辑 ---
async function fetchOrders() {
  document.getElementById('order-list').innerHTML = '加载中...';
  const { data, error } = await client.from('orders').select('*').order('id', { ascending: false });
  
  if (error) {
    document.getElementById('order-list').innerHTML = `<div class="card d">获取失败: ${esc(error.message)}</div>`;
    return;
  }
  if (!data || data.length === 0) {
    document.getElementById('order-list').innerHTML = '暂无订单';
    return;
  }

  document.getElementById('order-list').innerHTML = data.map(order =>
