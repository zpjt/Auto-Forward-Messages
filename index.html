<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外卖点单系统</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-24">

    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-md mx-auto px-4 flex justify-around py-3">
            <button onclick="switchTab('stores')" id="tab-stores" class="font-bold text-yellow-500 border-b-2 border-yellow-500 pb-1">Stores</button>
            <button onclick="switchTab('cart')" id="tab-cart" class="font-bold text-gray-500 pb-1">Cart <span id="cart-badge" class="hidden bg-red-500 text-white text-xs px-1.5 py-0.5 rounded-full">0</span></button>
            <button onclick="switchTab('orders')" id="tab-orders" class="font-bold text-gray-500 pb-1">Orders</button>
            <button onclick="switchTab('admin')" id="tab-admin" class="font-bold text-gray-500 pb-1">Admin</button>
        </div>
    </nav>

    <main class="max-w-md mx-auto px-4 py-6">
        
        <!-- 代付专用独立界面 (当URL中包含pay_order_id时触发) -->
        <div id="pay-share-view" class="hidden bg-white p-6 rounded-3xl shadow-lg border-2 border-yellow-400 text-center my-8">
            <div class="w-16 h-16 bg-yellow-100 text-yellow-600 rounded-full flex items-center justify-center text-2xl font-bold mx-auto mb-4">🤝</div>
            <h2 class="text-xl font-black mb-2">好友代付请求</h2>
            <p class="text-gray-500 text-sm mb-6">您的好友向您发送了一个外卖代付订单，吃饱饱就靠你啦！</p>
            
            <div class="bg-gray-50 p-4 rounded-2xl text-left mb-6 space-y-2">
                <p class="text-xs text-gray-400">订单单号: <span id="share-order-id" class="font-mono text-gray-700">#0</span></p>
                <p class="text-sm font-bold text-gray-800">订单内容: <span id="share-order-content">-</span></p>
                <div class="flex justify-between items-center pt-2 border-t border-gray-200">
                    <span class="text-gray-500 text-sm">代付金额:</span>
                    <span id="share-order-total" class="text-2xl font-black text-red-500">$0.00</span>
                </div>
            </div>

            <div class="space-y-3" id="share-pay-actions">
                <button onclick="payForFriend('alipay')" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-black py-4 rounded-2xl shadow-md transition">
                    使用 支付宝 帮他付
                </button>
                <button onclick="payForFriend('wxpay')" class="w-full bg-green-500 hover:bg-green-600 text-white font-black py-4 rounded-2xl shadow-md transition">
                    使用 微信支付 帮他付
                </button>
            </div>
        </div>
        
        <!-- 店铺与菜品列表 -->
        <div id="content-stores" class="tab-content active">
            <div id="stores-section">
                <h1 class="text-2xl font-black mb-6">Explore Restaurants</h1>
                <div id="stores-list" class="space-y-4">
                    <p class="text-gray-500 text-center py-8">Loading restaurants...</p>
                </div>
            </div>
            <div id="dishes-section" class="hidden">
                <button onclick="backToStores()" class="mb-4 text-sm font-bold text-yellow-600 flex items-center">← Back to Restaurants</button>
                <h2 id="current-store-name" class="text-2xl font-black mb-4">Store Name</h2>
                <div id="dishes-list" class="space-y-4"></div>
            </div>
        </div>

        <!-- 购物车 -->
        <div id="content-cart" class="tab-content">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-black">Your Cart</h1>
                <button onclick="clearCart()" id="clear-cart-btn" class="text-sm text-gray-400 font-bold hidden">Clear All</button>
            </div>
            <div id="cart-items" class="space-y-4"></div>
            <div id="cart-summary" class="mt-8 bg-white p-4 rounded-2xl shadow-sm hidden">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-gray-600">Total Price</span>
                    <span id="cart-total-price" class="text-xl font-bold text-red-500">$0.00</span>
                </div>
                <button onclick="checkout()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-black py-4 rounded-2xl shadow-lg transition duration-200">
                    Place Order & Pay
                </button>
            </div>
        </div>

        <!-- 订单列表 -->
        <div id="content-orders" class="tab-content">
            <h1 class="text-2xl font-black mb-6">Your Orders</h1>
            <div id="orders-list" class="space-y-4">
                <p class="text-gray-500 text-center py-8">No orders placed yet.</p>
            </div>
        </div>

        <!-- 管理后台 -->
        <div id="content-admin" class="tab-content">
            <div id="admin-login" class="bg-white p-6 rounded-2xl shadow-sm">
                <h2 class="text-xl font-black mb-4">Admin Login</h2>
                <input type="password" id="admin-password" placeholder="Enter admin password" class="w-full border border-gray-300 p-4 rounded-2xl mb-4 focus:ring-2 focus:ring-yellow-500 outline-none">
                <button onclick="loginAdmin()" class="w-full bg-black text-white font-black py-4 rounded-2xl">Login</button>
            </div>

            <div id="admin-portal" class="hidden space-y-6">
                <div class="flex justify-between items-center">
                    <h2 class="text-xl font-black">Admin Portal</h2>
                    <button onclick="logoutAdmin()" class="text-sm text-red-500 font-bold">Logout</button>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm space-y-4">
                    <h3 class="font-bold text-lg">Add New Store</h3>
                    <input type="text" id="new-store-name" placeholder="Store Name" class="w-full border p-3 rounded-xl outline-none">
                    <button onclick="addStore()" class="w-full bg-yellow-500 font-bold py-3 rounded-xl">Add Store</button>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm space-y-4">
                    <h3 class="font-bold text-lg">Add New Item to Store</h3>
                    <select id="target-store-select" class="w-full border p-3 rounded-xl outline-none">
                        <option value="">Select Target Store</option>
                    </select>
                    <input type="text" id="new-dish-name" placeholder="Dish Name" class="w-full border p-3 rounded-xl outline-none">
                    <input type="number" step="0.01" id="new-dish-price" placeholder="Price ($)" class="w-full border p-3 rounded-xl outline-none">
                    <button onclick="addDish()" class="w-full bg-yellow-500 font-bold py-3 rounded-xl">Add Item</button>
                </div>
            </div>
        </div>

    </main>

    <script>
        const SUPABASE_URL = 'https://cnotjxbuslxxhnjjjozr.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Z7N4AX4Bxne4lCxIfEUOvg_8dNXriUF';
        
        // 🚨 请配置为你真实微信/支付宝支付后端的服务地址（例：http://127.0.0.1:3000/api/pay）
        const REAL_PAY_BACKEND = 'YOUR_REAL_PAY_BACKEND_URL_HERE';

        async function supabaseFetch(path, options = {}) {
            const url = `${SUPABASE_URL}/rest/v1/${path}`;
            const headers = {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`,
                'Content-Type': 'application/json',
                ...options.headers
            };
            
            if (options.method && options.method !== 'GET') {
                headers['Prefer'] = 'return=representation';
            }

            const response = await fetch(url, { ...options, headers });
            if (!response.ok) {
                const errText = await response.text();
                throw new Error(errText || `HTTP ${response.status}`);
            }
            
            const text = await response.text();
            return text ? JSON.parse(text) : [];
        }

        let stores = [];
        let dishes = [];
        let cart = [];
        let currentStoreId = null;
        let shareOrderId = null; // 当前代付订单ID

        window.addEventListener('DOMContentLoaded', () => {
            // 检查URL是否是代付分享链接
            const urlParams = new URLSearchParams(window.location.search);
            const payOrderId = urlParams.get('pay_order_id');
            if (payOrderId) {
                initSharePayView(payOrderId);
            } else {
                loadStores();
            }
        });

        // 初始化代付页面
        async function initSharePayView(orderId) {
            shareOrderId = orderId;
            // 隐藏普通的导航栏和内容区
            document.querySelector('nav').classList.add('hidden');
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            
            const shareView = document.getElementById('pay-share-view');
            shareView.classList.remove('hidden');
            
            try {
                const [order] = await supabaseFetch(`orders?id=eq.${orderId}&select=*`);
                if (!order) {
                    document.getElementById('share-order-content').innerText = '订单不存在或已被删除';
                    document.getElementById('share-pay-actions').classList.add('hidden');
                    return;
                }
                
                document.getElementById('share-order-id').innerText = `#${order.id}`;
                document.getElementById('share-order-content').innerText = order.content;
                document.getElementById('share-order-total').innerText = `$${parseFloat(order.total).toFixed(2)}`;
                
                if (order.status === '已支付') {
                    document.getElementById('share-pay-actions').innerHTML = `<p class="text-green-600 font-bold py-2 bg-green-50 rounded-xl">✨ 该订单已被别的好友捷足先登付过了哦！</p>`;
                }
            } catch(err) {
                alert('获取代付订单失败: ' + err.message);
            }
        }

        // 好友点击代付，调用真实的微信/支付宝接口
        async function payForFriend(payType) {
            if (!shareOrderId) return;
            const totalText = document.getElementById('share-order-total').innerText.replace('$', '');
            const bodyText = document.getElementById('share-order-content').innerText;
            
            try {
                alert('正在为您跳转至大厂真实收银台...');
                const payResponse = await fetch(REAL_PAY_BACKEND, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        orderId: shareOrderId,
                        total: parseFloat(totalText),
                        body: bodyText,
                        payType: payType // 'alipay' 或 'wxpay'
                    })
                }).then(res => res.json());

                if (payResponse.success) {
                    // 跳转去真实的微信MWEB链接或支付宝Form链接
                    window.location.href = payResponse.payUrl;
                } else {
                    alert('真实渠道下单失败: ' + payResponse.message);
                }
            } catch(err) {
                alert('连接真实支付后端失败，请确认后端运行状态及网关配置: ' + err.message);
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`content-${tabId}`).classList.add('active');
            document.querySelectorAll('nav button').forEach(el => {
                el.classList.remove('text-yellow-500', 'border-b-2', 'border-yellow-500');
                el.classList.add('text-gray-500');
            });
            const activeBtn = document.getElementById(`tab-${tabId}`);
            activeBtn.classList.remove('text-gray-500');
            activeBtn.classList.add('text-yellow-500', 'border-b-2', 'border-yellow-500');

            if (tabId === 'stores') {
                backToStores();
                loadStores();
            } else if (tabId === 'cart') {
                renderCart();
            } else if (tabId === 'orders') {
                loadOrders();
            }
        }

        async function loadStores() {
            try {
                stores = await supabaseFetch('stores?select=*');
                const listContainer = document.getElementById('stores-list');
                const adminSelect = document.getElementById('target-store-select');
                
                if (stores.length === 0) {
                    listContainer.innerHTML = '<p class="text-gray-500 text-center py-8">没有找到任何店铺。</p>';
                    return;
                }
                listContainer.innerHTML = stores.map(store => `
                    <div onclick="showStoreDishes(${store.id}, '${store.name}')" class="bg-white p-4 rounded-2xl shadow-sm flex items-center space-x-4 cursor-pointer hover:bg-gray-50 transition">
                        <div class="w-16 h-16 bg-yellow-100 rounded-xl flex-shrink-0 flex items-center justify-center font-bold text-yellow-600">店</div>
                        <div>
                            <h3 class="font-black text-lg">${store.name}</h3>
                            <p class="text-gray-400 text-sm">点击探索美味</p>
                        </div>
                    </div>
                `).join('');

                if (adminSelect) {
                    adminSelect.innerHTML = '<option value="">Select Target Store</option>' + stores.map(store => `
                        <option value="${store.id}">${store.name}</option>
                    `).join('');
                }
            } catch (err) {
                document.getElementById('stores-list').innerHTML = `<p class="text-red-500 text-center py-8">获取店铺失败: ${err.message}</p>`;
            }
        }

        async function addStore() {
            const storeName = document.getElementById('new-store-name').value.trim();
            if (!storeName) { alert('请输入店铺名称！'); return; }
            try {
                await supabaseFetch('stores', {
                    method: 'POST',
                    body: JSON.stringify({ name: storeName })
                });
                alert(`🎉 上架成功！店铺 [${storeName}] 已成功录入！`);
                document.getElementById('new-store-name').value = '';
                loadStores();
            } catch (err) { alert('添加商家失败: ' + err.message); }
        }

        async function showStoreDishes(storeId, storeName) {
            currentStoreId = storeId;
            document.getElementById('stores-section').classList.add('hidden');
            document.getElementById('dishes-section').classList.remove('hidden');
            document.getElementById('current-store-name').innerText = storeName;
            const dishesList = document.getElementById('dishes-list');
            dishesList.innerHTML = '<p class="text-gray-500 text-center py-8">Loading...</p>';
            try {
                dishes = await supabaseFetch(`dishes?store_id=eq.${storeId}&select=*`);
                if (dishes.length === 0) {
                    dishesList.innerHTML = '<p class="text-gray-500 text-center py-8">该店铺暂无商品上架。</p>';
                    return;
                }
                dishesList.innerHTML = dishes.map(dish => `
                    <div class="bg-white p-4 rounded-2xl shadow-sm flex items-center justify-between">
                        <div>
                            <h3 class="font-black text-base">${dish.name}</h3>
                            <p class="text-red-500 font-bold mt-1">$${parseFloat(dish.price).toFixed(2)}</p>
                        </div>
                        <button onclick="addToCart(${dish.id}, '${dish.name.replace(/'/g, "\\'")}', ${dish.price})" class="bg-yellow-500 hover:bg-yellow-600 text-black font-black px-4 py-2 rounded-xl text-sm shadow-sm transition">＋ Add</button>
                    </div>
                `).join('');
            } catch (err) { dishesList.innerHTML = `<p class="text-red-500 text-center py-8">失败: ${err.message}</p>`; }
        }

        function backToStores() {
            currentStoreId = null;
            document.getElementById('dishes-section').classList.add('hidden');
            document.getElementById('stores-section').classList.remove('hidden');
        }

        function addToCart(dishId, dishName, price) {
            const item = cart.find(i => i.dishId === dishId);
            if (item) { item.quantity += 1; } else { cart.push({ dishId, dishName, price, quantity: 1 }); }
            updateCartBadge();
        }

        function updateCartBadge() {
            const badge = document.getElementById('cart-badge');
            const totalCount = cart.reduce((sum, item) => sum + item.quantity, 0);
            if (totalCount > 0) {
                badge.innerText = totalCount;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        function clearCart() {
            cart = [];
            renderCart();
            updateCartBadge();
        }

        function renderCart() {
            const cartItemsContainer = document.getElementById('cart-items');
            const cartSummary = document.getElementById('cart-summary');
            const clearBtn = document.getElementById('clear-cart-btn');
            
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<p class="text-gray-500 text-center py-8">Your cart is empty.</p>';
                cartSummary.classList.add('hidden');
                clearBtn.classList.add('hidden');
                return;
            }
            cartSummary.classList.remove('hidden');
            clearBtn.classList.remove('hidden');
            
            let total = 0;
            cartItemsContainer.innerHTML = cart.map(item => {
                total += item.price * item.quantity;
                return `<div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center">
                    <div><h3 class="font-black text-base">${item.dishName}</h3><p class="text-gray-400 text-xs">$${parseFloat(item.price).toFixed(2)} × ${item.quantity}</p></div>
                    <span class="font-bold text-gray-800">$${(item.price * item.quantity).toFixed(2)}</span>
                </div>`;
            }).join('');
            document.getElementById('cart-total-price').innerText = `$${total.toFixed(2)}`;
        }

        // 🔗 核心修改：取消模拟支付，改为生成真实的代付链接
        async function checkout() {
            if (cart.length === 0) return;
            let total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            let contentString = cart.map(item => `${item.dishName}x${item.quantity}`).join(', ');
            
            try {
                // 1. 在数据库生成一笔待代付的订单
                const [newOrder] = await supabaseFetch('orders', {
                    method: 'POST',
                    body: JSON.stringify({ 
                        content: contentString, 
                        total: total, 
                        status: '待代付',
                        created_at: new Date().toISOString()
                    })
                });

                if (!newOrder || !newOrder.id) throw new Error("订单初始化失败");

                // 2. 动态构建带有当前订单参数的代付链接
                const shareLink = `${window.location.origin}${window.location.pathname}?pay_order_id=${newOrder.id}`;
                
                // 3. 提示复制
                navigator.clipboard.writeText(shareLink).then(() => {
                    alert(`🎉 下单成功！订单号为 #${newOrder.id}\n\n专属代付链接已自动复制到剪贴板，快发送给微信/QQ好友帮你买单吧！`);
                }).catch(() => {
                    // 兼容有些浏览器不支持剪贴板API的情况
                    prompt(`🎉 下单成功！\n请手动复制下方的代付链接发给好友：`, shareLink);
                });

                cart = [];
                updateCartBadge();
                switchTab('orders');
            } catch (err) { alert('下单失败: ' + err.message); }
        }

        async function loadOrders() {
            const ordersList = document.getElementById('orders-list');
            ordersList.innerHTML = '<p class="text-gray-500 text-center py-8">Loading...</p>';
            try {
                const orders = await supabaseFetch('orders?select=*&order=id.desc');
                if (orders.length === 0) {
                    ordersList.innerHTML = '<p class="text-gray-500 text-center py-8">No orders yet.</p>';
                    return;
                }
                ordersList.innerHTML = orders.map(order => {
                    const dateDisplay = order.created_at ? new Date(order.created_at).toLocaleString() : '刚刚';
                    let statusColor = 'bg-red-100 text-red-500';
                    if (order.status === '已支付') statusColor = 'bg-green-100 text-green-600';
                    else if (order.status === '待代付') statusColor = 'bg-orange-100 text-orange-600';

                    return `
                        <div class="bg-white p-5 rounded-2xl shadow-sm space-y-3">
                            <div class="flex justify-between items-center border-b pb-2 border-gray-100">
                                <span class="text-xs text-gray-400">ID: #${order.id}</span>
                                <span class="px-2 py-1 text-xs font-black rounded-lg ${statusColor}">${order.status}</span>
                            </div>
                            <p class="text-gray-800 font-bold text-sm">${order.content}</p>
                            <div class="flex justify-between items-center pt-1">
                                <span class="text-xs text-gray-400">${dateDisplay}</span>
                                <span class="text-lg font-black text-red-500">$${parseFloat(order.total).toFixed(2)}</span>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) { ordersList.innerHTML = `<p class="text-red-500 text-center py-8">失败: ${err.message}</p>`; }
        }

        async function addDish() {
            const storeId = document.getElementById('target-store-select').value;
            const dishName = document.getElementById('new-dish-name').value.trim();
            const dishPrice = document.getElementById('new-dish-price').value;
            if (!storeId || !dishName || !dishPrice) { alert('请填写完整信息！'); return; }
            try {
                await supabaseFetch('dishes', {
                    method: 'POST',
                    body: JSON.stringify({ store_id: parseInt(storeId), name: dishName, price: parseFloat(dishPrice) })
                });
                alert(`🎉 菜品 [${dishName}] 已成功添加！`);
                document.getElementById('new-dish-name').value = '';
                document.getElementById('new-dish-price').value = '';
            } catch (err) { alert('失败: ' + err.message); }
        }

        function loginAdmin() {
            const pwd = document.getElementById('admin-password').value;
            if (pwd === 'admin') {
                document.getElementById('admin-login').classList.add('hidden');
                document.getElementById('admin-portal').classList.remove('hidden');
                loadStores();
            } else { alert('密码错误！'); }
        }
        function logoutAdmin() {
            document.getElementById('admin-password').value = '';
            document.getElementById('admin-login').classList.remove('hidden');
            document.getElementById('admin-portal').classList.add('hidden');
        }
    </script>
</body>
</html>
