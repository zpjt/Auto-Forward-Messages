<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>购物车系统</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#f5f5f5;--card:#fff;--text:#111;--muted:#8a8a8a;--primary:#ffd000;--primary-dark:#ffbf00;--danger:#ff4d4f;--success:#00b578;--border:#ececec;--shadow:0 8px 24px rgba(0,0,0,.06);}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text)}
.nav{display:flex;gap:10px;padding:14px 12px;background:linear-gradient(135deg,#111,#2b2b2b);position:sticky;top:0;z-index:10;overflow:auto}
.nav-item{padding:10px 14px;border-radius:999px;cursor:pointer;background:rgba(255,255,255,.08);color:#fff;font-weight:700;white-space:nowrap}
.nav-item.active{background:var(--primary);color:#111}
.tab-view{display:none;padding:14px;max-width:1100px;margin:0 auto}
.tab-view.active{display:block}
h2{margin:8px 0 14px;font-size:22px;font-weight:800}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select{padding:12px 14px;border:1px solid #ddd;border-radius:14px;background:#fff;outline:none;width:100%}
.btn{padding:10px 14px;border:0;border-radius:14px;cursor:pointer;font-weight:700}
.p{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#111;width:100%}
.muted{color:var(--muted)}
</style>
</head>
<body>
<div class="nav">
  <div class="nav-item active" data-tab="view-stores">🏪 商家</div>
  <div class="nav-item" data-tab="view-cart">🛒 购物车</div>
  <div class="nav-item" data-tab="view-orders">📋 订单</div>
</div>

<div id="view-stores" class="tab-view active">
  <h2>商家列表</h2>
  <div id="store-list" class="muted">加载中...</div>
</div>

<div id="view-cart" class="tab-view">
  <h2>购物车</h2>
  <div class="card">
    共 <b id="cart-count">0</b> 件，合计 ¥<b id="cart-total">0.00</b>
    <button class="btn p" style="margin-top:10px;" onclick="checkout()">提交订单并进入代付页</button>
  </div>
  <div id="cart-list" class="muted">购物车为空</div>
</div>

<div id="view-orders" class="tab-view">
  <h2>订单</h2>
  <div id="order-list" class="muted">加载中...</div>
</div>

<script>
const SUPABASE_URL='https://dzesfxynbljtkwsbhbvq.supabase.co';
const SUPABASE_KEY='sb_publishable_sRewE8k63terKgMBcBV3wQ_0LKBXpNZ';
const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let cart = {};

document.addEventListener('DOMContentLoaded', () => {
  loadStores();
  loadOrders();
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.querySelectorAll('.tab-view').forEach(t => t.classList.remove('active'));
      item.classList.add('active');
      document.getElementById(item.getAttribute('data-tab')).classList.add('active');
    });
  });
});

async function loadStores() {
  const { data: stores } = await client.from('stores').select('*');
  const { data: dishes } = await client.from('dishes').select('*');
  const storeListEl = document.getElementById('store-list');
  let html = '';
  stores.forEach(store => {
    html += `<div class="card"><b>🏪 ${store.name}</b>`;
    dishes.filter(d => d.store_id === store.id).forEach(dish => {
      html += `<div class="row" style="justify-content:space-between;margin-top:10px;">
        <span>${dish.name} (¥${dish.price})</span>
        <button class="btn p" onclick="addToCart('${dish.id}', '${dish.name}', ${dish.price})">加入</button>
      </div>`;
    });
    html += `</div>`;
  });
  storeListEl.innerHTML = html;
}

async function checkout() {
  if (Object.keys(cart).length === 0) return alert('购物车是空的！');
  const { data, error } = await client.from('orders').insert([{ content: JSON.stringify(cart) }]).select();
  if (error) return alert('提交失败: ' + error.message);
  
  // 跳转到你的代付页面
  window.location.href = 'pay.html?order_id=' + data[0].id;
}

function addToCart(id, name, price) {
  if (cart[id]) cart[id].count++;
  else cart[id] = { name, price, count: 1 };
  renderCart();
}

function renderCart() {
  let total = 0, count = 0, html = '';
  for (let id in cart) {
    total += cart[id].price * cart[id].count;
    count += cart[id].count;
    html += `<div class="card">${cart[id].name} x${cart[id].count}</div>`;
  }
  document.getElementById('cart-count').innerText = count;
  document.getElementById('cart-total').innerText = total.toFixed(2);
  document.getElementById('cart-list').innerHTML = count > 0 ? html : '购物车为空';
}

async function loadOrders() {
  const { data: orders } = await client.from('orders').select('*').order('id', { ascending: false });
  document.getElementById('order-list').innerHTML = (orders||[]).map(o => `<div class="card">订单 #${o.id}</div>`).join('');
}
</script>
</body>
</html>
