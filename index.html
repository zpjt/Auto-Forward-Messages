<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外卖点单系统</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-24">

    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-md mx-auto px-4 flex justify-around py-3">
            <button onclick="switchTab('stores')" id="tab-stores" class="font-bold text-yellow-500 border-b-2 border-yellow-500 pb-1">Stores</button>
            <button onclick="switchTab('cart')" id="tab-cart" class="font-bold text-gray-500 pb-1">Cart</button>
            <button onclick="switchTab('orders')" id="tab-orders" class="font-bold text-gray-500 pb-1">Orders</button>
            <button onclick="switchTab('admin')" id="tab-admin" class="font-bold text-gray-500 pb-1">Admin</button>
        </div>
    </nav>

    <main class="max-w-md mx-auto px-4 py-6">
        
        <div id="content-stores" class="tab-content active">
            <h1 class="text-2xl font-black mb-6">Explore Restaurants</h1>
            <div id="stores-list" class="space-y-4">
                <p class="text-gray-500 text-center py-8">Loading restaurants...</p>
            </div>
            <div id="dishes-section" class="hidden mt-8">
                <button onclick="backToStores()" class="mb-4 text-sm font-bold text-yellow-600 flex items-center">← Back to Restaurants</button>
                <h2 id="current-store-name" class="text-2xl font-black mb-4">Store Name</h2>
                <div id="dishes-list" class="space-y-4"></div>
            </div>
        </div>

        <div id="content-cart" class="tab-content">
            <h1 class="text-2xl font-black mb-6">Your Cart</h1>
            <div id="cart-items" class="space-y-4"></div>
            <div id="cart-summary" class="mt-8 bg-white p-4 rounded-2xl shadow-sm hidden">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-gray-600">Total Price</span>
                    <span id="cart-total-price" class="text-xl font-bold text-red-500">$0.00</span>
                </div>
                <button onclick="checkout()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-black py-4 rounded-2xl shadow-lg transition duration-200">
                    Place Order & Pay
                </button>
            </div>
        </div>

        <div id="content-orders" class="tab-content">
            <h1 class="text-2xl font-black mb-6">Your Orders</h1>
            <div id="orders-list" class="space-y-4">
                <p class="text-gray-500 text-center py-8">No orders placed yet.</p>
            </div>
        </div>

        <div id="content-admin" class="tab-content">
            <div id="admin-login" class="bg-white p-6 rounded-2xl shadow-sm">
                <h2 class="text-xl font-black mb-4">Admin Login</h2>
                <input type="password" id="admin-password" placeholder="Enter admin password" class="w-full border border-gray-300 p-4 rounded-2xl mb-4 focus:ring-2 focus:ring-yellow-500 outline-none">
                <button onclick="loginAdmin()" class="w-full bg-black text-white font-black py-4 rounded-2xl">Login</button>
            </div>

            <div id="admin-portal" class="hidden space-y-6">
                <div class="flex justify-between items-center">
                    <h2 class="text-xl font-black">Admin Portal</h2>
                    <button onclick="logoutAdmin()" class="text-sm text-red-500 font-bold">Logout</button>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm space-y-4">
                    <h3 class="font-bold text-lg">Add New Store</h3>
                    <input type="text" id="new-store-name" placeholder="Store Name" class="w-full border p-3 rounded-xl outline-none">
                    <button onclick="addStore()" class="w-full bg-yellow-500 font-bold py-3 rounded-xl">Add Store</button>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm space-y-4">
                    <h3 class="font-bold text-lg">Add New Item to Store</h3>
                    <select id="target-store-select" class="w-full border p-3 rounded-xl outline-none">
                        <option value="">Select Target Store</option>
                    </select>
                    <input type="text" id="new-dish-name" placeholder="Dish Name" class="w-full border p-3 rounded-xl outline-none">
                    <input type="number" step="0.01" id="new-dish-price" placeholder="Price ($)" class="w-full border p-3 rounded-xl outline-none">
                    <button onclick="addDish()" class="w-full bg-yellow-500 font-bold py-3 rounded-xl">Add Item</button>
                </div>
            </div>
        </div>

    </main>

    <script>
        const SUPABASE_URL = 'https://supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5cXVmcnFpd2NzeHd6Ymh5Z25yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNjI4MTgsImV4cCI6MjA5OTczODgxOH0.ElVeaTZzSrlWC5v7j9HJNzwe7ZoVW2NPmSHhIOmBtUI';

        async function supabaseFetch(path, options = {}) {
            const url = `${SUPABASE_URL}/rest/v1/${path}`;
            const headers = {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=representation',
                ...options.headers
            };
            const response = await fetch(url, { ...options, headers });
            if (!response.ok) {
                const errText = await response.text();
                throw new Error(errText || `HTTP ${response.status}`);
            }
            return response.json();
        }

        let stores = [];
        let dishes = [];
        let cart = [];
        let currentStoreId = null;

        window.addEventListener('DOMContentLoaded', () => {
            loadStores();
        });

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`content-${tabId}`).classList.add('active');
            document.querySelectorAll('nav button').forEach(el => {
                el.classList.remove('text-yellow-500', 'border-b-2', 'border-yellow-500');
                el.classList.add('text-gray-500');
            });
            const activeBtn = document.getElementById(`tab-${tabId}`);
            activeBtn.classList.remove('text-gray-500');
            activeBtn.classList.add('text-yellow-500', 'border-b-2', 'border-yellow-500');

            if (tabId === 'stores') {
                backToStores();
                loadStores();
            } else if (tabId === 'cart') {
                renderCart();
            } else if (tabId === 'orders') {
                loadOrders();
            }
        }
        async function loadStores() {
            try {
                stores = await supabaseFetch('stores?select=*');
                const listContainer = document.getElementById('stores-list');
                const adminSelect = document.getElementById('target-store-select');
                
                if (stores.length === 0) {
                    listContainer.innerHTML = '<p class="text-gray-500 text-center py-8">没有找到任何店铺。</p>';
                    return;
                }
                listContainer.innerHTML = stores.map(store => `
                    <div onclick="showStoreDishes(${store.id}, '${store.name}')" class="bg-white p-4 rounded-2xl shadow-sm flex items-center space-x-4 cursor-pointer">
                        <div class="w-16 h-16 bg-gray-200 rounded-xl flex-shrink-0 flex items-center justify-center font-bold text-gray-400">店</div>
                        <div>
                            <h3 class="font-black text-lg">${store.name}</h3>
                            <p class="text-gray-400 text-sm">点击探索美味</p>
                        </div>
                    </div>
                `).join('');

                if (adminSelect) {
                    adminSelect.innerHTML = '<option value="">Select Target Store</option>' + stores.map(store => `
                        <option value="${store.id}">${store.name}</option>
                    `).join('');
                }
            } catch (err) {
                document.getElementById('stores-list').innerHTML = `<p class="text-red-500 text-center py-8">获取店铺失败: ${err.message}</p>`;
            }
        }

        async function addStore() {
            const storeName = document.getElementById('new-store-name').value;
            if (!storeName) { alert('请输入店铺名称！'); return; }
            try {
                await supabaseFetch('stores', {
                    method: 'POST',
                    body: JSON.stringify({ name: storeName })
                });
                alert(`🎉 上架成功！店铺 [${storeName}] 已成功录入数据库！`);
                document.getElementById('new-store-name').value = '';
                loadStores();
            } catch (err) { alert('添加商家失败: ' + err.message); }
        }

        async function showStoreDishes(storeId, storeName) {
            currentStoreId = storeId;
            document.getElementById('stores-list').classList.add('hidden');
            document.getElementById('dishes-section').classList.remove('hidden');
            document.getElementById('current-store-name').innerText = storeName;
            const dishesList = document.getElementById('dishes-list');
            dishesList.innerHTML = '<p class="text-gray-500 text-center py-8">Loading...</p>';
            try {
                dishes = await supabaseFetch(`dishes?store_id=eq.${storeId}&select=*`);
                if (dishes.length === 0) {
                    dishesList.innerHTML = '<p class="text-gray-500 text-center py-8">该店铺暂无商品上架。</p>';
                    return;
                }
                dishesList.innerHTML = dishes.map(dish => `
                    <div class="bg-white p-4 rounded-2xl shadow-sm flex items-center justify-between">
                        <div>
                            <h3 class="font-black text-base">${dish.name}</h3>
                            <p class="text-red-500 font-bold mt-1">$${parseFloat(dish.price).toFixed(2)}</p>
                        </div>
                        <button onclick="addToCart(${dish.id}, '${dish.name}', ${dish.price})" class="bg-yellow-500 text-black font-black px-4 py-2 rounded-xl text-sm shadow-sm">＋ Add</button>
                    </div>
                `).join('');
            } catch (err) { dishesList.innerHTML = `<p class="text-red-500 text-center py-8">失败: ${err.message}</p>`; }
        }

        function backToStores() {
            currentStoreId = null;
            document.getElementById('dishes-section').classList.add('hidden');
            document.getElementById('stores-list').classList.remove('hidden');
        }

        function addToCart(dishId, dishName, price) {
            const item = cart.find(i => i.dishId === dishId);
            if (item) { item.quantity += 1; } else { cart.push({ dishId, dishName, price, quantity: 1 }); }
            alert(`已加入购物车！`);
        }

        function renderCart() {
            const cartItemsContainer = document.getElementById('cart-items');
            const cartSummary = document.getElementById('cart-summary');
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<p class="text-gray-500 text-center py-8">Your cart is empty.</p>';
                cartSummary.classList.add('hidden');
                return;
            }
            cartSummary.classList.remove('hidden');
            let total = 0;
            cartItemsContainer.innerHTML = cart.map(item => {
                total += item.price * item.quantity;
                return `<div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center">
                    <div><h3 class="font-black text-base">${item.dishName}</h3><p class="text-gray-400 text-xs">$${parseFloat(item.price).toFixed(2)} × ${item.quantity}</p></div>
                    <span class="font-bold text-gray-800">$${(item.price * item.quantity).toFixed(2)}</span>
                </div>`;
            }).join('');
            document.getElementById('cart-total-price').innerText = `$${total.toFixed(2)}`;
        }

        async function checkout() {
            if (cart.length === 0) return;
            let total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            let contentString = cart.map(item => `${item.dishName}x${item.quantity}`).join(', ');
            try {
                await supabaseFetch('orders', {
                    method: 'POST',
                    body: JSON.stringify({ content: contentString, total: total, status: '待支付' })
                });
                alert('订单创建成功！');
                cart = [];
                switchTab('orders');
            } catch (err) { alert('下单失败: ' + err.message); }
        }

        async function loadOrders() {
            const ordersList = document.getElementById('orders-list');
            ordersList.innerHTML = '<p class="text-gray-500 text-center py-8">Loading...</p>';
            try {
                const orders = await supabaseFetch('orders?select=*&order=id.desc');
                if (orders.length === 0) {
                    ordersList.innerHTML = '<p class="text-gray-500 text-center py-8">No orders yet.</p>';
                    return;
                }
                ordersList.innerHTML = orders.map(order => `
                    <div class="bg-white p-5 rounded-2xl shadow-sm space-y-3">
                        <div class="flex justify-between items-center border-b pb-2 border-gray-100">
                            <span class="text-xs text-gray-400">ID: #${order.id}</span>
                            <span class="px-2 py-1 text-xs font-black rounded-lg ${order.status === '已支付' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-500'}">${order.status}</span>
                        </div>
                        <p class="text-gray-800 font-bold text-sm">${order.content}</p>
                        <div class="flex justify-between items-center pt-1">
                            <span class="text-xs text-gray-400">${new Date(order.created_at).toLocaleString()}</span>
                            <span class="text-lg font-black text-red-500">$${parseFloat(order.total).toFixed(2)}</span>
                        </div>
                    </div>
                `).join('');
            } catch (err) { ordersList.innerHTML = `<p class="text-red-500 text-center py-8">失败: ${err.message}</p>`; }
        }

        async function addDish() {
            const storeId = document.getElementById('target-store-select').value;
            const dishName = document.getElementById('new-dish-name').value;
            const dishPrice = document.getElementById('new-dish-price').value;
            if (!storeId || !dishName || !dishPrice) { alert('请填写完整信息！'); return; }
            try {
                await supabaseFetch('dishes', {
                    method: 'POST',
                    body: JSON.stringify({ store_id: parseInt(storeId), name: dishName, price: parseFloat(dishPrice) })
                });
                alert(`🎉 菜品 [${dishName}] 已成功添加！`);
                document.getElementById('new-dish-name').value = '';
                document.getElementById('new-dish-price').value = '';
            } catch (err) { alert('失败: ' + err.message); }
        }

        function loginAdmin() {
            const pwd = document.getElementById('admin-password').value;
            if (pwd === 'admin') {
                document.getElementById('admin-login').classList.add('hidden');
                document.getElementById('admin-portal').classList.remove('hidden');
                loadStores();
            } else { alert('密码错误！'); }
        }
        function logoutAdmin() {
            document.getElementById('admin-password').value = '';
            document.getElementById('admin-login').classList.remove('hidden');
            document.getElementById('admin-portal').classList.add('hidden');
        }
    </script>
</body>
</html>
