<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICBC 聚合支付系统</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #f8f9fa; font-family: "PingFang SC", sans-serif; padding-bottom: 70px; }
        .tab-view { display: none; }
        .active { display: block; }
        .card { background: white; margin: 12px; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 60px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 999; }
        
        /* 增强版工行支付弹窗 */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; }
        .icbc-container { background: #fff; width: 85%; border-radius: 12px; overflow: hidden; text-align: center; }
        .icbc-top { background: #004a99; color: white; padding: 20px; }
        .icbc-body { padding: 20px; }
        .btn-pay { width: 90%; background: #004a99; color: white; padding: 12px; border-radius: 6px; border: none; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="view-home" class="tab-view active">
        <div style="padding:20px; font-size:18px; font-weight:bold;">热门商户</div>
        <div id="store-list">加载中...</div>
    </div>

    <div id="view-cart" class="tab-view">
        <div style="padding:20px; font-size:18px; font-weight:bold;">购物车结算</div>
        <div id="cart-list" style="padding:10px;">您的购物车是空的</div>
    </div>

    <div id="view-orders" class="tab-view">
        <div style="padding:20px; font-size:18px; font-weight:bold;">交易记录</div>
        <div id="order-list">暂无订单</div>
    </div>

    <div id="view-admin" class="tab-view">
        <div style="padding:20px; font-size:18px; font-weight:bold;">系统管理</div>
        <div class="card">
            <input id="store-input" placeholder="请输入商家名称" style="border:none; width:70%;">
            <button onclick="addStore()" style="background:#004a99; color:white; border:none; padding:5px 10px;">添加</button>
        </div>
    </div>

    <div id="modal-pay" class="modal">
        <div class="icbc-container">
            <div class="icbc-top">中国工商银行支付</div>
            <div class="icbc-body">
                <p>订单金额: <b style="font-size:24px;">¥19.90</b></p>
                <img src="https://i.ibb.co/BKf8xrTP/IMG-1422.jpg" style="width:180px; border:1px solid #eee; padding:5px;">
                <p style="font-size:12px; color:#888;">请使用手机银行或扫码完成支付</p>
                <button class="btn-pay" onclick="executePayment()">已完成支付</button>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div onclick="switchTab('view-home')">🏠 首页</div>
        <div onclick="switchTab('view-cart')">🛒 购物车</div>
        <div onclick="switchTab('view-orders')">📋 订单</div>
        <div onclick="switchTab('view-admin')">⚙️ 管理</div>
    </div>

    <script>
        const client = supabase.createClient("https://dzesfxynbljtkwsbhbvq.supabase.co", "sb_publishable_sRewE8k63terKgMBcBV3wQ_0LKBXpNZ");
        let cart = [];

        function switchTab(id) {
            document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'view-orders') loadOrders();
        }

        async function loadStores() {
            const { data } = await client.from('stores').select('*');
            document.getElementById('store-list').innerHTML = data?.map(s => `
                <div class="card">
                    <div><b>${s.name}</b></div>
                    <button onclick="addToCart('${s.name}')" style="background:#ffcc00; border:none; padding:5px 15px; border-radius:15px;">添加</button>
                </div>
            `).join('') || '暂无商家';
        }

        function addToCart(name) {
            cart.push(name);
            alert("已加入: " + name);
            document.getElementById('cart-list').innerHTML = `
                <div class="card">
                    <div>${cart.join(' + ')}</div>
                    <button class="btn-pay" style="width:auto; padding:5px 15px;" onclick="document.getElementById('modal-pay').style.display='flex'">去支付</button>
                </div>
            `;
        }

        async function executePayment() {
            const btn = document.querySelector('.btn-pay');
            btn.innerText = "处理中...";
            await client.from('orders').insert([{ items: cart.join(','), status: 'paid' }]);
            alert("支付验证成功！");
            document.getElementById('modal-pay').style.display = 'none';
            btn.innerText = "已完成支付";
            cart = [];
            switchTab('view-orders');
        }

        async function addStore() {
            const name = document.getElementById('store-input').value;
            await client.from('stores').insert([{ name: name }]);
            alert("商家已添加");
            loadStores();
        }

        async function loadOrders() {
            const { data } = await client.from('orders').select('*').order('created_at', {ascending:false});
            document.getElementById('order-list').innerHTML = data?.map(o => `
                <div class="card">
                    <div>${o.items}</div>
                    <div style="color:green; font-weight:bold;">已入账</div>
                </div>
            `).join('') || '暂无记录';
        }

        loadStores();
    </script>
</body>
</html>
