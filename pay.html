<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>美团外卖 | 为好友买单</title>

  <meta property="og:title" content="美团外卖 | 外卖美食奶茶..." />
  <meta property="og:description" content="交易保障｜你好，我和你的距离只差一顿外卖~ 来帮我代付吧~" />
  <meta property="og:image" content="https://i.ibb.co/n9FPGnj/IMG-1830.png" />
  <meta property="og:type" content="website" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#f5f5f5;
      --card:#fff;
      --text:#111;
      --muted:#888;
      --yellow:#ffd000;
      --yellow-dark:#ffbf00;
      --border:#ececec;
      --shadow:0 8px 24px rgba(0,0,0,.06);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{max-width:720px;margin:0 auto;padding:14px}
    .hero{
      background:linear-gradient(135deg,#111,#2b2b2b);
      color:#fff;
      border-radius:22px;
      padding:18px;
      box-shadow:var(--shadow);
      margin-top:10px;
    }
    .hero h1{margin:0 0 6px;font-size:22px}
    .hero p{margin:0;color:#ddd;font-size:14px;line-height:1.6}
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:14px;
      margin-top:12px;
    }
    .title{font-weight:800;font-size:16px;margin-bottom:10px}
    .row{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
    }
    .muted{color:var(--muted);font-size:13px}
    .item{
      display:flex;
      justify-content:space-between;
      gap:10px;
      padding:10px 0;
      border-top:1px solid #f0f0f0;
    }
    .item:first-child{border-top:0}
    .name{font-weight:700}
    .right{text-align:right;white-space:nowrap}
    .total{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-top:10px;
      padding-top:12px;
      border-top:1px solid #f0f0f0;
      font-size:16px;
      font-weight:800;
    }
    .btn{
      width:100%;
      margin-top:14px;
      border:0;
      border-radius:16px;
      padding:14px 16px;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
    }
    .btn-pay{
      background:linear-gradient(135deg,var(--yellow),var(--yellow-dark));
      color:#111;
    }
    .btn-pay:active{transform:scale(.99)}
    .btn-copy{
      background:#fff;
      border:1px solid #ddd;
      color:#111;
    }
    .loading{
      text-align:center;
      padding:30px 0;
      color:#444;
    }
    .spinner{
      width:28px;
      height:28px;
      border-radius:50%;
      border:4px solid #eee;
      border-top-color:var(--yellow);
      animation:spin 1s linear infinite;
      margin:0 auto 10px;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .hint{
      margin-top:10px;
      text-align:center;
      color:#666;
      font-size:13px;
      line-height:1.6;
    }
    .box{
      background:#fafafa;
      border:1px dashed #e5e5e5;
      border-radius:16px;
      padding:12px;
      margin-top:10px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>美团外卖</h1>
      <p>交易保障｜你好，我和你的距离只差一顿外卖~ 来帮我代付吧~</p>
    </div>

    <div id="loading" class="card loading">
      <div class="spinner"></div>
      正在加载订单详情...
    </div>

    <div id="orderBox" style="display:none;">
      <div class="card">
        <div class="title">订单信息</div>
        <div class="row">
          <div>
            <div><b id="storeName">购物车订单</b></div>
            <div class="muted">订单号：#<span id="orderId">加载中...</span></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="title">商品明细</div>
        <div id="itemList" class="box"></div>
        <div class="total">
          <span>合计需代付</span>
          <span style="color:#ff4d4f;">¥<span id="orderTotal">0.00</span></span>
        </div>
      </div>

      <button class="btn btn-pay" onclick="handlePay()">立即代付</button>
      <button class="btn btn-copy" onclick="copyLink()">复制代付链接</button>
      <div class="hint">点击复制链接发送给您的好友即可帮您代付</div>
    </div>
  </div>

  <script>
    // 配置 Supabase
    const client = supabase.createClient(
      'https://dzesfxynbljtkwsbhbvq.supabase.co', 
      'sb_publishable_sRewE8k63terKgMBcBV3wQ_0LKBXpNZ'
    );

    document.addEventListener('DOMContentLoaded', async () => {
      // 1. 获取 URL 参数中的 order_id
      const params = new URLSearchParams(window.location.search);
      const orderId = params.get('order_id');

      if (!orderId) {
        document.getElementById('loading').innerHTML = '未找到订单号，请返回下单';
        return;
      }

      // 2. 从 Supabase 读取对应订单数据
      const { data, error } = await client.from('orders').select('*').eq('id', orderId).single();

      if (error || !data) {
        document.getElementById('loading').innerHTML = '订单加载失败';
        return;
      }

      // 3. 渲染页面
      document.getElementById('loading').style.display = 'none';
      document.getElementById('orderBox').style.display = 'block';
      document.getElementById('orderId').innerText = data.id;

      try {
        const items = JSON.parse(data.content);
        let html = '', total = 0;
        for (let id in items) {
          html += `<div class="item">
                     <span class="name">${items[id].name}</span>
                     <span class="right">x${items[id].count}<br><span class="muted">¥${items[id].price}</span></span>
                   </div>`;
          total += items[id].price * items[id].count;
        }
        document.getElementById('itemList').innerHTML = html;
        document.getElementById('orderTotal').innerText = total.toFixed(2);
      } catch (e) {
        document.getElementById('itemList').innerHTML = '订单内容解析失败';
      }
    });

    function handlePay() {
      alert('正在唤起支付接口...');
    }

    function copyLink() {
      // 复制当前的完整链接，好友点开就是这张卡片
      navigator.clipboard.writeText(window.location.href);
      alert('代付链接已复制，快发给好友吧！');
    }
  </script>
</body>
</html>
