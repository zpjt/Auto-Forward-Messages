<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>待代付订单</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; margin: 0; padding: 15px; }
        .header { font-size: 16px; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; }
        .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .amount-label { font-size: 14px; color: #666; }
        .amount-value { font-size: 36px; font-weight: bold; color: #333; margin: 10px 0; }
        .notice { background: #fffde7; border-radius: 8px; padding: 15px; font-size: 13px; color: #856404; margin: 15px 0; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-yellow { background: #ffd000; color: #333; }
        .btn-gray { background: #f0f0f0; color: #555; }
    </style>
</head>
<body>

<div class="header">📋 待代付订单</div>

<div id="pay-view" class="card">
    <div class="amount-label">需付款</div>
    <div class="amount-value">¥<span id="display-amount">0.00</span></div>
    
    <div class="notice">
        付款须知：<br>
        1. 代付订单创建后，请于15分钟内完成支付。<br>
        2. 支付后请点击下方按钮确认。
    </div>

    <button class="btn btn-yellow" onclick="wakeUpAlipay()">为好友买单</button>
    <button class="btn btn-gray" onclick="alert('已发送确认请求')">我已支付，点击确认</button>
</div>

<script>
    // 已更新为你的真实支付宝收款码链接
    const ALIPAY_QR_URL = "https://qr.alipay.com/2m612342txzv1x1aorosqa0";

    const params = new URLSearchParams(window.location.search);
    const amount = params.get('amount') || "0.00";
    document.getElementById('display-amount').innerText = amount;

    function wakeUpAlipay() {
        // 使用支付宝 Scheme 唤醒
        const scheme = `alipays://platformapi/startapp?saId=10000007&qrcode=${encodeURIComponent(ALIPAY_QR_URL)}`;
        window.location.href = scheme;
        
        // 兜底：如果未成功唤醒 App，1.5秒后自动跳转至网页收款链接
        setTimeout(() => {
            window.location.href = ALIPAY_QR_URL;
        }, 1500);
    }
</script>
</body>
</html>
