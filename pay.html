<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>美团外卖 | 交易保障</title>

    <meta property="og:title" content="美团外卖 | 交易保障" />
    <meta property="og:description" content="Hi, 你和我的距离只差一顿外卖~ 请帮我支付这笔订单。" />
    
    <meta property="og:image" content="https://i.ibb.co/zzVqM3z/IMG-1830.png" />
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #ffffff;
            margin: 0;
            text-align: center;
        }
        .loading {
            text-align: center;
            color: #333333;
            font-size: 18px;
            font-weight: 500;
            padding: 20px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ffd000; /* 美团黄 */
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading">
        <div class="spinner"></div>
        <div>正在为你跳转到支付宝支付...</div>
    </div>

    <script>
        // 当用户点击卡片进入这个页面时，自动触发跳转逻辑
        window.onload = function() {
            // 尝试直接跳转支付宝唤醒协议 (alipays://...)
            // 这是一个 deeplink，浏览器如果安装了支付宝 App 会尝试打开它
            window.location.href = "alipays://platformapi/startapp?saId=10000007";
            
            // 如果跳转失败（例如在微信内置浏览器中，微信会拦截 alipays 协议），
            // 脚本会继续执行下面的代码。我们在 1.5 秒后提示用户手动操作。
            setTimeout(() => {
                // 这是一个标准做法，因为微信生态的限制，无法强制静默跳转
                alert("🎉 正在尝试打开支付宝完成代付！\n\n如果未自动跳转，请点击页面右上角三个点 (⋯)，选择“在浏览器中打开”，即可完成支付。");
            }, 1500); // 延迟 1.5 秒弹出提示，给跳转留出时间
        }
    </script>
</body>
</html>
