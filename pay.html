<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>美团外卖 | 为好友买单</title>

  <meta property="og:title" content="美团外卖 | 外卖美食奶茶..." />
  <meta property="og:description" content="交易保障｜你好，我和你的距离只差一顿外卖~ 来帮我代付吧~" />
  <meta property="og:image" content="https://i.ibb.co/n9FPGnj/IMG-1830.png" />
  <meta property="og:type" content="website" />

  <style>
    :root{
      --bg:#f5f5f5;
      --card:#fff;
      --text:#111;
      --muted:#888;
      --yellow:#ffd000;
      --yellow-dark:#ffbf00;
      --border:#ececec;
      --shadow:0 8px 24px rgba(0,0,0,.06);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{max-width:720px;margin:0 auto;padding:14px}
    .hero{
      background:linear-gradient(135deg,#111,#2b2b2b);
      color:#fff;
      border-radius:22px;
      padding:18px;
      box-shadow:var(--shadow);
      margin-top:10px;
    }
    .hero h1{margin:0 0 6px;font-size:22px}
    .hero p{margin:0;color:#ddd;font-size:14px;line-height:1.6}
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:14px;
      margin-top:12px;
    }
    .title{font-weight:800;font-size:16px;margin-bottom:10px}
    .row{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
    }
    .muted{color:var(--muted);font-size:13px}
    .item{
      display:flex;
      justify-content:space-between;
      gap:10px;
      padding:10px 0;
      border-top:1px solid #f0f0f0;
    }
    .item:first-child{border-top:0}
    .name{font-weight:700}
    .right{text-align:right;white-space:nowrap}
    .total{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-top:10px;
      padding-top:12px;
      border-top:1px solid #f0f0f0;
      font-size:16px;
      font-weight:800;
    }
    .btn{
      width:100%;
      margin-top:14px;
      border:0;
      border-radius:16px;
      padding:14px 16px;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
    }
    .btn-pay{
      background:linear-gradient(135deg,var(--yellow),var(--yellow-dark));
      color:#111;
    }
    .btn-pay:active{transform:scale(.99)}
    .btn-copy{
      background:#fff;
      border:1px solid #ddd;
      color:#111;
    }
    .loading{
      text-align:center;
      padding:30px 0;
      color:#444;
    }
    .spinner{
      width:28px;
      height:28px;
      border-radius:50%;
      border:4px solid #eee;
      border-top-color:var(--yellow);
      animation:spin 1s linear infinite;
      margin:0 auto 10px;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .error{
      color:#c00;
      background:#fff0f0;
      border:1px solid #ffd6d6;
      padding:12px;
      border-radius:14px;
      margin-top:12px;
    }
    .hint{
      margin-top:10px;
      text-align:center;
      color:#666;
      font-size:13px;
      line-height:1.6;
    }
    .box{
      background:#fafafa;
      border:1px dashed #e5e5e5;
      border-radius:16px;
      padding:12px;
      margin-top:10px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>美团外卖</h1>
      <p>交易保障｜你好，我和你的距离只差一顿外卖~ 来帮我代付吧~</p>
    </div>

    <div id="loading" class="card loading">
      <div class="spinner"></div>
      正在加载订单详情...
    </div>

    <div id="orderBox" style="display:none;">
      <div class="card">
        <div class="title">订单信息</div>
        <div class="row">
          <div>
            <div><b id="storeName">商家</b></div>
            <div class="muted">订单号：<span id="orderId">加载中...</span></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="title">商品明细</div>
        <div id="itemList" class="box">
          </div>
        <div class="total">
          <span>合计需代付</span>
          <span style="color:#ff4d4f;">¥<span id="orderTotal">0.00</span></span>
        </div>
      </div>

      <button class="btn btn-pay" onclick="handlePay()">立即代付</button>
      <button class="btn btn-copy" onclick="copyLink()">复制代付链接</button>
      <div class="hint">点击复制链接发送给您的好友即可帮您代付</div>
    </div>
  </div>

  <script>
    // 补全基础逻辑让界面能正确展示
    document.addEventListener('DOMContentLoaded', () => {
      // 模拟 1 秒后加载完毕
      setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('orderBox').style.display = 'block';

        // 填入模拟数据
        document.getElementById('storeName').innerText = '正宗麻辣烫';
        document.getElementById('orderId').innerText = 'MT893247923487';
        document.getElementById('orderTotal').innerText = '28.50';

        document.getElementById('itemList').innerHTML = `
          <div class="item">
            <span class="name">麻辣烫自选套餐</span>
            <span class="right">x1<br><span class="muted">¥28.50</span></span>
          </div>
        `;
      }, 1000);
    });

    function handlePay() {
      alert('正在唤起支付接口...');
    }

    function copyLink() {
      alert('代付链接已复制！');
    }
  </script>
</body>
</html>
